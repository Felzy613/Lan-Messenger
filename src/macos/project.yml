# xcodegen project spec for LAN Messenger macOS
#
# Prerequisites:
#   brew install xcodegen
#
# Usage (from src/macos/):
#   xcodegen generate
#   open LanMessenger.xcodeproj
#
# After opening in Xcode:
#   1. Select the LanMessenger target -> Signing & Capabilities
#   2. Set your Team (personal or paid Apple Developer account)
#   3. Product -> Run to test; Product -> Archive to build a release
#
# Note: swift build / swift test still work independently via Package.swift.

name: LanMessenger

options:
  bundleIdPrefix: com.dave
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    ALWAYS_SEARCH_USER_PATHS: "NO"
    ENABLE_STRICT_OBJC_MSGSEND: "YES"

targets:
  LanMessenger:
    type: application
    platform: macOS
    deploymentTarget: "13.0"

    sources:
      - path: LanMessenger
        excludes:
          - "**/*.md"
          - "**/*.plist"
          - "**/*.entitlements"

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.dave.lanmessenger
        MARKETING_VERSION: "1.6.4"
        CURRENT_PROJECT_VERSION: "1"
        INFOPLIST_FILE: LanMessenger/Info.plist
        CODE_SIGN_ENTITLEMENTS: LanMessenger/LanMessenger.entitlements
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""          # ← fill in your Apple Developer Team ID
        ENABLE_HARDENED_RUNTIME: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Silence deprecation warnings from the old onChange(of:perform:) API
        # while we remain on the macOS 13 minimum deployment target.
        OTHER_SWIFT_FLAGS: "-Xfrontend -warn-concurrency"

schemes:
  LanMessenger:
    build:
      targets:
        LanMessenger: all
    run:
      config: Debug
    test:
      config: Debug
      # Tests run via `swift test` (Package.swift); no Xcode test target needed.
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
