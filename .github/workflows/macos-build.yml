name: macOS Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'src/macos/**'
      - '.github/workflows/macos-build.yml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    env:
      TEAM_ID: 7FAZT3258V

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: src/macos
        run: xcodegen generate --spec project.yml --project .

      - name: Set version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          # Create a temporary keychain
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PASSWORD=$(openssl rand -hex 16)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import the certificate
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          echo "$CERTIFICATE_BASE64" | base64 --decode -o "$CERT_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/xcodebuild

          # Make keychain available to codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build (signed)
        working-directory: src/macos
        run: |
          xcodebuild \
            -project LanMessenger.xcodeproj \
            -scheme  LanMessenger \
            -configuration Release \
            -derivedDataPath build/derived \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic \
            build

      - name: Locate .app
        id: app
        working-directory: src/macos
        run: |
          APP=$(find build/derived -name "LAN Messenger.app" -o -name "LanMessenger.app" | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "name=$(basename "$APP")" >> $GITHUB_OUTPUT

      - name: Zip .app
        run: |
          cd "$(dirname "${{ steps.app.outputs.path }}")"
          zip -r --symlinks \
            "$GITHUB_WORKSPACE/LanMessenger-macOS-${{ steps.version.outputs.version }}.zip" \
            "${{ steps.app.outputs.name }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "macos-v${{ steps.version.outputs.version }}" \
            --title "LAN Messenger macOS v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "LanMessenger-macOS-${{ steps.version.outputs.version }}.zip"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain" || true
