name: macOS Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'src/macos/**'
      - '.github/workflows/macos-build.yml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: src/macos
        run: xcodegen generate --spec project.yml --project .

      - name: Set version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      # ── Compile (no signing — codesign handles it below) ──────────────────
      - name: Build
        working-directory: src/macos
        run: |
          xcodebuild \
            -project LanMessenger.xcodeproj \
            -scheme  LanMessenger \
            -configuration Release \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      # ── Import cert + sign the .app ───────────────────────────────────────
      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 20)"

          # Decode certificate (macOS base64 -D flag)
          echo "$CERTIFICATE_BASE64" | base64 -D -o "$CERT_PATH"

          # Create and unlock temporary keychain
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Import cert + private key
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12

          # Grant codesign access without UI prompts
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # Add to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          # Confirm identity is visible
          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning

      - name: Sign .app
        run: |
          APP=$(find "$GITHUB_WORKSPACE/src/macos/build/derived" \
            \( -name "LanMessenger.app" -o -name "LAN Messenger.app" \) | head -1)
          echo "Signing: $APP"
          codesign --deep --force --options runtime \
            --sign "Apple Development: davefelzy20@gmail.com (7FAZT3258V)" \
            --entitlements "$GITHUB_WORKSPACE/src/macos/LanMessenger/LanMessenger.entitlements" \
            "$APP"
          codesign --verify --deep --strict "$APP" && echo "✅ Signature valid"
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          echo "APP_NAME=$(basename "$APP")" >> $GITHUB_ENV

      - name: Zip .app
        run: |
          cd "$(dirname "$APP_PATH")"
          zip -r --symlinks \
            "$GITHUB_WORKSPACE/LanMessenger-macOS-${{ steps.version.outputs.version }}.zip" \
            "$APP_NAME"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "macos-v${{ steps.version.outputs.version }}" \
            --title "LAN Messenger macOS v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "LanMessenger-macOS-${{ steps.version.outputs.version }}.zip"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true
