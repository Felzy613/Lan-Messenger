name: Build macOS

# Pipeline: preflight → build-test-package → validate → publish
#
# preflight          Read + validate version, check if release exists, detect
#                    whether this is a major/minor bump (drives smoke-test gate).
#
# build-test-package Run Swift tests, regenerate icons, sign, and package PKG + ZIP.
#
# validate           Verify SHA256 sidecars, validate PKG structure, and run the
#                    install+launch smoke test (major/minor bumps only).
#
# publish            Create the macos-v{version} pre-release with all artifacts.
#                    The Release Orchestration workflow rolls it into a combined
#                    user-facing release.

on:
  push:
    branches: [main]
    paths:
      - 'src/macos/**'
      - 'version/macos.json'
      - 'shared/**'
      - 'scripts/macos/**'
      - '.github/workflows/build-macos.yml'
      - 'Images/Logo.png'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version already released'
        type: boolean
        default: false
      skip_smoke:
        description: 'Skip the install+launch smoke test'
        type: boolean
        default: false
      notarize:
        description: 'Notarize the signed artifacts (requires NOTARY_* secrets)'
        type: boolean
        default: false

concurrency:
  group: build-macos
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Preflight ────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_exists: ${{ steps.check.outputs.exists }}
      run_smoke: ${{ steps.bump.outputs.run_smoke }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        run: |
          VERSION=$(jq -r '.version' version/macos.json)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid semver '$VERSION' in version/macos.json"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "macOS version: $VERSION"

      - name: Check whether release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="macos-v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Release $TAG already exists — skipping pipeline"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Smoke test is expensive (~10 min). Run it for major/minor bumps only;
      # skip automatically for patch releases (e.g. 1.6.5 → 1.6.6).
      - name: Detect bump type for smoke gate
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PREV_TAG=$(gh release list --limit 100 \
            --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("macos-v"))] | .[0].tagName // empty' \
            2>/dev/null || true)

          RUN_SMOKE=true
          if [ -n "$PREV_TAG" ]; then
            PREV_VER="${PREV_TAG#macos-v}"
            CUR_MAJ=$(echo "$VERSION"  | cut -d. -f1)
            CUR_MIN=$(echo "$VERSION"  | cut -d. -f2)
            PRV_MAJ=$(echo "$PREV_VER" | cut -d. -f1)
            PRV_MIN=$(echo "$PREV_VER" | cut -d. -f2)
            if [ "$CUR_MAJ" = "$PRV_MAJ" ] && [ "$CUR_MIN" = "$PRV_MIN" ]; then
              RUN_SMOKE=false
            fi
          fi
          echo "run_smoke=$RUN_SMOKE" >> $GITHUB_OUTPUT
          echo "Smoke test: $RUN_SMOKE (previous tag: ${PREV_TAG:-(none)})"

  # ── Test, build, sign, and package ──────────────────────────────────────────
  build-test-package:
    name: Test, Build & Package
    needs: preflight
    if: |
      needs.preflight.outputs.release_exists == 'false' ||
      inputs.force_rebuild == true
    runs-on: macos-15
    timeout-minutes: 35
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: src/macos/.build
          key: swift-${{ runner.os }}-${{ hashFiles('src/macos/Package.swift') }}
          restore-keys: swift-${{ runner.os }}-

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-xcodegen-v1

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null || true

      - name: Run unit tests
        working-directory: src/macos
        run: |
          set -o pipefail
          swift test --parallel 2>&1 | tee ../../test-output-macos.txt
          exit ${PIPESTATUS[0]}

      - name: Regenerate icon set + AppIcon.icns
        run: |
          python3 -m venv /tmp/icon-venv
          /tmp/icon-venv/bin/pip install --quiet Pillow
          /tmp/icon-venv/bin/python3 src/macos/scripts/generate_icon.py

      - name: Import signing certificate
        id: signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::notice::No MACOS_CERTIFICATE secret — using ad-hoc signing"
            echo "identity=" >> $GITHUB_OUTPUT
            echo "keychain=" >> $GITHUB_OUTPUT
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          IDENTITY="${MACOS_SIGNING_IDENTITY}"
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          fi
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" \
              | awk -F'"' 'NR==1{print $2}')
          fi

          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "keychain=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "::notice::Signing identity: $IDENTITY"
          rm /tmp/certificate.p12

      - name: Build + package (PKG, ZIP)
        env:
          VERSION: ${{ env.VERSION }}
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          NOTARIZE: ${{ inputs.notarize && '1' || '0' }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/macos
          KEEP_BUILD: '1'
        run: |
          chmod +x scripts/macos/package.sh
          scripts/macos/package.sh

      - name: List produced artifacts
        run: ls -lh dist/macos/

      - name: Upload artifacts for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: |
            dist/macos/*.pkg
            dist/macos/*.pkg.sha256
            dist/macos/*.zip
            dist/macos/*.zip.sha256
          retention-days: 1
          if-no-files-found: error

      - name: Clean up keychain
        if: always() && steps.signing.outputs.keychain != ''
        run: security delete-keychain "${{ steps.signing.outputs.keychain }}" 2>/dev/null || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-macos-${{ github.run_id }}
          path: |
            test-output-macos.txt
            src/macos/build/package.log
          retention-days: 14
          if-no-files-found: ignore

  # ── Validate (SHA256 + structure + smoke) ───────────────────────────────────
  validate:
    name: Validate
    needs: [preflight, build-test-package]
    if: needs.build-test-package.result == 'success'
    runs-on: macos-15
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: dist/macos/

      - name: Verify SHA256 sidecars
        working-directory: dist/macos
        run: |
          FAIL=0
          for SC in *.sha256; do
            EXPECTED=$(awk '{print $1}' "$SC")
            FILE=$(basename "$SC" .sha256)
            if [ ! -f "$FILE" ]; then
              echo "::error::Sidecar $SC references missing file $FILE"; FAIL=$((FAIL+1)); continue
            fi
            ACTUAL=$(/usr/bin/shasum -a 256 "$FILE" | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "::error::SHA256 mismatch for $FILE"; FAIL=$((FAIL+1))
            else
              echo "  ✓ $FILE"
            fi
          done
          [ "$FAIL" -eq 0 ]

      - name: Validate PKG structure
        run: |
          chmod +x scripts/macos/validate-pkg.sh scripts/macos/validate-bundle.sh
          scripts/macos/validate-pkg.sh "$(ls dist/macos/*.pkg | head -1)"

      # Smoke test: installs the PKG and confirms the app starts.
      # Runs only on major/minor version bumps to keep patch releases fast.
      # Override with skip_smoke: true to skip entirely.
      - name: Smoke test — PKG install + launch
        if: needs.preflight.outputs.run_smoke == 'true' && inputs.skip_smoke != true
        run: |
          chmod +x scripts/macos/smoke-test.sh
          scripts/macos/smoke-test.sh "$(ls dist/macos/*.pkg | head -1)"

      - name: Smoke test — ZIP (updater channel)
        if: needs.preflight.outputs.run_smoke == 'true' && inputs.skip_smoke != true
        run: scripts/macos/smoke-test.sh "$(ls dist/macos/*.zip | head -1)"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p crash-reports
          cp ~/Library/Logs/DiagnosticReports/LanMessenger* crash-reports/ 2>/dev/null || true
          log show --process LanMessenger --last 5m --info > crash-reports/console.log 2>/dev/null || true
          cp smoke.log crash-reports/ 2>/dev/null || true
          LOGDIR="$HOME/Library/Application Support/LanMessenger/Logs"
          [ -d "$LOGDIR" ] && cp -R "$LOGDIR" crash-reports/client-logs 2>/dev/null || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-diagnostics-macos-${{ github.run_id }}
          path: crash-reports/
          retention-days: 14
          if-no-files-found: ignore

  # ── Publish platform pre-release ─────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [preflight, build-test-package, validate]
    if: |
      needs.build-test-package.result == 'success' &&
      needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: dist/

      - name: Remove existing release (force rebuild only)
        if: inputs.force_rebuild == true
        run: |
          TAG="macos-v${VERSION}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Generate release notes
        run: |
          chmod +x scripts/shared/generate-release-notes.sh
          scripts/shared/generate-release-notes.sh macos "$VERSION" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Append download table to release notes
        run: |
          {
            echo ""
            echo "---"
            echo ""
            echo "**macOS v${VERSION}** — platform pre-release"
            echo ""
            echo "| Format | Use case |"
            echo "|--------|----------|"
            echo "| \`.pkg\` | Standard install — double-click or MDM/JAMF/Munki deploy |"
            echo "| \`.zip\` | In-app updater channel |"
            echo ""
            echo "Each artifact has a matching \`.sha256\` sidecar."
          } >> /tmp/release-notes.md

      - name: Create platform release
        run: |
          TAG="macos-v${VERSION}"
          ASSETS=()
          for f in dist/*.pkg dist/*.pkg.sha256 dist/*.zip dist/*.zip.sha256; do
            [ -f "$f" ] && ASSETS+=("$f")
          done
          gh release create "$TAG" \
            --title "macOS v${VERSION}" \
            --prerelease \
            --notes-file /tmp/release-notes.md \
            "${ASSETS[@]}"
          echo "::notice::Published $TAG with ${#ASSETS[@]} asset(s)"

      # Assets are already attached to the GitHub Release above — the Actions
      # artifact copy is redundant CI byproduct. Delete it immediately instead
      # of waiting out retention-days, so build artifacts never accumulate
      # against the account-wide Actions storage quota.
      - name: Delete build artifact (already published to release)
        if: always()
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts?name=macos-build-${{ github.run_id }}" \
            --jq '.artifacts[].id' | while read -r id; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" && \
              echo "Deleted artifact $id" || echo "::warning::Failed to delete artifact $id"
          done
