name: Build macOS

# End-to-end macOS release pipeline.
#
#   preflight  →  build-test-package  →  validate  →  publish
#
# preflight        Ubuntu. Reads version/macos.json, validates semver, checks if
#                  the macos-v{version} release already exists. Skips the rest
#                  when it does (unless force_rebuild is set).
#
# build-test-pkg   macOS runner. Runs unit tests, regenerates the icon catalog
#                  + AppIcon.icns from Images/Logo.png, builds + signs the .app,
#                  then packages a PKG (primary) and ZIP (updater) through
#                  scripts/macos/package.sh. Every artifact gets an accompanying
#                  .sha256 sidecar.
#
# validate         macOS runner. Downloads the artifacts and runs three checks:
#                    1. validate-bundle.sh  — structural / branding integrity
#                    2. validate-pkg.sh     — PKG expands cleanly and contains a
#                                              valid .app with pre/postinstall scripts
#                    3. smoke-test.sh       — installs the PKG into /Applications
#                                              and confirms the app actually
#                                              starts and stays alive
#
# publish          Ubuntu. Creates the `macos-v{version}` release with every
#                  artifact + sidecar attached. The Release Orchestration
#                  workflow picks it up for the combined release.

on:
  push:
    branches: [main]
    paths:
      - 'src/macos/**'
      - 'version/macos.json'
      - 'shared/**'
      - 'scripts/macos/**'
      - '.github/workflows/build-macos.yml'
      - '.github/actions/**'
      - 'Images/Logo.png'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version already released'
        type: boolean
        default: false
      skip_smoke:
        description: 'Skip the install+launch smoke test'
        type: boolean
        default: false
      notarize:
        description: 'Notarize the signed artifacts (requires NOTARY_* secrets)'
        type: boolean
        default: false

concurrency:
  group: build-macos
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Preflight ───────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        run: |
          VERSION=$(jq -r '.version' version/macos.json)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid semver '$VERSION' in version/macos.json"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "macOS version: $VERSION"

      - name: Check whether release already exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="macos-v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Release $TAG already exists — skipping pipeline"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ── Test, build, sign, and package ──────────────────────────────────────────
  build-test-package:
    name: Test, Build & Package
    needs: preflight
    if: |
      needs.preflight.outputs.release_exists == 'false' ||
      inputs.force_rebuild == true
    runs-on: macos-15
    timeout-minutes: 35
    permissions:
      contents: read
      issues: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Swift build artifacts
        uses: actions/cache@v4
        with:
          path: src/macos/.build
          key: swift-${{ runner.os }}-${{ hashFiles('src/macos/Package.swift') }}
          restore-keys: swift-${{ runner.os }}-

      - name: Cache Homebrew downloads
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/Homebrew
          key: homebrew-${{ runner.os }}-xcodegen-v1

      - name: Install xcodegen
        run: brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null || true

      # Run unit tests first — fail fast before we spend time on packaging.
      - name: Run unit tests
        working-directory: src/macos
        run: |
          set -o pipefail
          swift test --parallel 2>&1 | tee ../../test-output-macos.txt
          exit ${PIPESTATUS[0]}

      # Regenerate the icon catalog + AppIcon.icns on the mac runner. The
      # repo-committed icons are correct, but iconutil only exists on macOS
      # so this step is what ensures AppIcon.icns is always fresh and matches
      # Images/Logo.png byte-for-byte at release time.
      - name: Regenerate icon set + AppIcon.icns
        run: |
          python3 -m venv /tmp/icon-venv
          /tmp/icon-venv/bin/pip install --quiet Pillow
          /tmp/icon-venv/bin/python3 src/macos/scripts/generate_icon.py
          ls -la src/macos/LanMessenger/Assets.xcassets/AppIcon.appiconset/

      # Import the developer signing certificate (only when present). We
      # gracefully fall back to ad-hoc signing when MACOS_CERTIFICATE is not
      # configured, so forks and PR runs still produce installable artifacts.
      - name: Import signing certificate
        id: signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PWD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
        run: |
          if [ -z "$MACOS_CERTIFICATE" ]; then
            echo "::notice::No MACOS_CERTIFICATE secret — using ad-hoc signing"
            echo "identity=" >> $GITHUB_OUTPUT
            echo "keychain=" >> $GITHUB_OUTPUT
            exit 0
          fi

          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain"
          KEYCHAIN_PWD=$(openssl rand -hex 16)
          echo "$MACOS_CERTIFICATE" | base64 --decode > /tmp/certificate.p12

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security import /tmp/certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security \
            -T /usr/bin/productbuild
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          # If the workflow's secret tells us which identity string to use,
          # honor it. Otherwise, autodetect by name.
          IDENTITY="${MACOS_SIGNING_IDENTITY}"
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" \
              | awk -F'"' '/Developer ID Application/ {print $2; exit}')
          fi
          if [ -z "$IDENTITY" ]; then
            IDENTITY=$(security find-identity -p codesigning -v "$KEYCHAIN_PATH" \
              | awk -F'"' 'NR==1{print $2}')
          fi

          echo "identity=$IDENTITY" >> $GITHUB_OUTPUT
          echo "keychain=$KEYCHAIN_PATH" >> $GITHUB_OUTPUT
          echo "::notice::Signing identity: $IDENTITY"
          rm /tmp/certificate.p12

      # Hand control to scripts/macos/package.sh — the single source of truth
      # for how to build, sign, and package the macOS app. Same script is used
      # for local builds.
      - name: Build + package (PKG, ZIP)
        env:
          VERSION: ${{ env.VERSION }}
          SIGNING_IDENTITY: ${{ steps.signing.outputs.identity }}
          NOTARIZE: ${{ inputs.notarize && '1' || '0' }}
          NOTARY_APPLE_ID: ${{ secrets.NOTARY_APPLE_ID }}
          NOTARY_TEAM_ID: ${{ secrets.NOTARY_TEAM_ID }}
          NOTARY_PASSWORD: ${{ secrets.NOTARY_PASSWORD }}
          OUTPUT_DIR: ${{ github.workspace }}/dist/macos
          KEEP_BUILD: '1'
        run: |
          chmod +x scripts/macos/package.sh
          scripts/macos/package.sh

      - name: List produced artifacts
        run: |
          ls -lh dist/macos/

      - name: Upload artifacts for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: |
            dist/macos/*.pkg
            dist/macos/*.pkg.sha256
            dist/macos/*.zip
            dist/macos/*.zip.sha256
          retention-days: 1
          if-no-files-found: error

      - name: Clean up keychain
        if: always() && steps.signing.outputs.keychain != ''
        run: security delete-keychain "${{ steps.signing.outputs.keychain }}" 2>/dev/null || true

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-macos-${{ github.run_id }}
          path: |
            test-output-macos.txt
            src/macos/build/package.log
          retention-days: 30
          if-no-files-found: ignore

      - name: Report failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          platform: macos
          version: ${{ needs.preflight.outputs.version }}
          failure_type: BUILD_FAILURE
          log_path: src/macos/build/package.log
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Validate (install + launch smoke test) ──────────────────────────────────
  validate:
    name: Validate (install + launch)
    needs: [preflight, build-test-package]
    if: needs.build-test-package.result == 'success'
    runs-on: macos-15
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: dist/macos/

      - name: List downloaded artifacts
        run: ls -lh dist/macos/

      - name: Verify SHA256 sidecars match
        working-directory: dist/macos
        run: |
          FAIL=0
          for SC in *.sha256; do
            EXPECTED=$(awk '{print $1}' "$SC")
            FILE=$(basename "$SC" .sha256)
            if [ ! -f "$FILE" ]; then
              echo "::error::Sidecar $SC references missing file $FILE"
              FAIL=$((FAIL + 1))
              continue
            fi
            ACTUAL=$(/usr/bin/shasum -a 256 "$FILE" | awk '{print $1}')
            if [ "$EXPECTED" != "$ACTUAL" ]; then
              echo "::error::SHA256 mismatch for $FILE: expected $EXPECTED, got $ACTUAL"
              FAIL=$((FAIL + 1))
            else
              echo "  ✓ $FILE"
            fi
          done
          [ "$FAIL" -eq 0 ]

      - name: Validate PKG (expand + bundle integrity)
        run: |
          chmod +x scripts/macos/validate-pkg.sh scripts/macos/validate-bundle.sh
          PKG=$(ls dist/macos/*.pkg | head -1)
          scripts/macos/validate-pkg.sh "$PKG"

      - name: Smoke-test the PKG install flow
        if: inputs.skip_smoke != true
        run: |
          chmod +x scripts/macos/smoke-test.sh
          PKG=$(ls dist/macos/*.pkg | head -1)
          scripts/macos/smoke-test.sh "$PKG"

      - name: Smoke-test the ZIP install flow (updater channel)
        if: inputs.skip_smoke != true
        run: |
          ZIP=$(ls dist/macos/*.zip | head -1)
          scripts/macos/smoke-test.sh "$ZIP"

      - name: Collect diagnostics on failure
        if: failure()
        run: |
          mkdir -p crash-reports/
          cp ~/Library/Logs/DiagnosticReports/LanMessenger* crash-reports/ 2>/dev/null || true
          log show --process LanMessenger --last 5m --info > crash-reports/console.log 2>/dev/null || true
          cp smoke.log crash-reports/ 2>/dev/null || true
          cp dist/macos/smoke.log crash-reports/pkg-smoke.log 2>/dev/null || true
          # Collect the structured client logs (active + rotated archives) so
          # transfer / discovery / screenshot events from the smoke run are
          # available in the failure artifact bundle.
          if [ -d "$HOME/Library/Application Support/LanMessenger/Logs" ]; then
            cp -R "$HOME/Library/Application Support/LanMessenger/Logs" crash-reports/client-logs 2>/dev/null || true
          fi

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: validate-diagnostics-macos-${{ github.run_id }}
          path: crash-reports/
          retention-days: 30
          if-no-files-found: ignore

      - name: Report failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          platform: macos
          version: ${{ needs.preflight.outputs.version }}
          failure_type: SMOKE_FAILURE
          log_path: crash-reports/console.log
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish release ─────────────────────────────────────────────────────────
  publish:
    name: Publish Platform Release
    needs: [preflight, build-test-package, validate]
    if: |
      needs.build-test-package.result == 'success' &&
      needs.validate.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-build-${{ github.run_id }}
          path: dist/

      - name: Remove existing release (force rebuild only)
        if: inputs.force_rebuild == true
        run: |
          TAG="macos-v${VERSION}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Create platform release
        run: |
          TAG="macos-v${VERSION}"

          # Extract the changelog entry for this version (empty string if not found).
          CHANGELOG_ENTRY=$(awk -v ver="[${VERSION}]" '
            /^## \[/ { in_ver = ($2 == ver); next }
            in_ver   { print }
          ' CHANGELOG.md)

          cd dist

          # Compose release notes describing every artifact we publish.
          {
            if [ -n "$CHANGELOG_ENTRY" ]; then
              echo "## What's New"
              echo ""
              printf '%s\n' "$CHANGELOG_ENTRY"
              echo ""
            fi
            echo "macOS platform build v${VERSION}"
            echo ""
            echo "Commit: ${{ github.sha }}"
            echo "Branch: ${{ github.ref_name }}"
            echo "Built:  $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo ""
            echo "## Download"
            echo ""
            echo "| Format | When to use |"
            echo "|--------|-------------|"
            echo "| **\`.pkg\`** | Standard download for everyone. Double-click to install to /Applications. MDM/JAMF/Munki compatible. |"
            echo "| **\`.zip\`** | Updater channel — used by the in-app updater. Top-level is \`LAN Messenger.app\`. |"
            echo ""
            echo "Each artifact ships with a matching \`.sha256\` sidecar."
            echo ""
            echo "Platform pre-release. Combined release auto-created by Release Orchestration workflow."
          } > /tmp/release-notes.md

          ASSETS=()
          for f in *.pkg *.pkg.sha256 *.zip *.zip.sha256; do
            [ -f "$f" ] && ASSETS+=("$f")
          done

          gh release create "$TAG" \
            --title "macOS v${VERSION}" \
            --prerelease \
            --notes-file /tmp/release-notes.md \
            "${ASSETS[@]}"

          echo "::notice::Published $TAG with ${#ASSETS[@]} asset(s)"

      - name: Close resolved CI failure issues
        run: |
          chmod +x scripts/shared/close-ci-issues.sh
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            scripts/shared/close-ci-issues.sh macos "$VERSION" "${{ github.sha }}"
