name: Build Windows

on:
  push:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - 'version/windows.json'
      - 'shared/**'
      - '.github/workflows/build-windows.yml'
      - '.github/actions/**'
      - 'scripts/windows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version already released'
        type: boolean
        default: false
      skip_smoke:
        description: 'Skip startup smoke test'
        type: boolean
        default: false

# One Windows build at a time — prevents parallel runs from corrupting releases
concurrency:
  group: build-windows
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Preflight ─────────────────────────────────────────────────────────────────
  # Runs on ubuntu (fast/cheap). Validates the version and checks whether we
  # already published this version — if so, every downstream job is skipped.
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        run: |
          VERSION=$(jq -r '.version' version/windows.json)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid semver '$VERSION' in version/windows.json — must match X.Y or X.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Windows version: $VERSION"

      - name: Check for existing platform release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="windows-v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Release $TAG already exists — skipping (use force_rebuild to override)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  # ── Test + Build + Package ────────────────────────────────────────────────────
  # Single job: tests and the release build share one runner so .NET only
  # compiles the source tree once. Skipped entirely if the version is already
  # released (unless force_rebuild is set).
  build-test:
    name: Test, Build & Package
    needs: preflight
    if: |
      needs.preflight.outputs.release_exists == 'false' ||
      inputs.force_rebuild == true
    runs-on: windows-2022
    timeout-minutes: 20
    permissions:
      contents: read
      issues: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    defaults:
      run:
        working-directory: src/windows-native
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # VS MSBuild is required to build the WinUI 3 project (dotnet SDK MSBuild
      # lacks the Windows SDK Pri packaging tasks used by WindowsAppSDK targets).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/windows-native/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: msbuild /t:Restore /p:Configuration=Release /p:Platform=x64 LanMessenger.sln

      # ── Tests ────────────────────────────────────────────────────────────────
      # MSBuild compiles to bin\x64\Release\ which is reused by xcodebuild
      # publish below, making this a single-compilation pipeline.
      - name: Build test project
        shell: pwsh
        run: |
          msbuild LanMessenger.Tests\LanMessenger.Tests.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            2>&1 | Tee-Object -FilePath ..\..\test-output-windows.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run unit tests
        shell: pwsh
        run: |
          # VS MSBuild (Platform=x64) outputs to bin\x64\Release\ while
          # 'dotnet test --no-build' resolves to bin\Release\, so we locate
          # the DLL ourselves and pass it directly to dotnet vstest.
          $testDll = Get-ChildItem -Path "LanMessenger.Tests\bin" `
                       -Filter "LanMessenger.Tests.dll" -Recurse |
                     Select-Object -First 1
          if (-not $testDll) {
            Write-Error "Test DLL not found under LanMessenger.Tests\bin\"
            exit 1
          }
          Write-Host "Running tests from: $($testDll.FullName)"
          dotnet vstest $testDll.FullName `
            --logger:"console;verbosity=normal" `
            2>&1 | Tee-Object -Append -FilePath ..\..\test-output-windows.txt
          exit $LASTEXITCODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-${{ github.run_id }}
          path: |
            src/windows-native/LanMessenger.Tests/TestResults/
            test-output-windows.txt
          retention-days: 30

      # ── Build ────────────────────────────────────────────────────────────────
      - name: Publish self-contained app
        shell: pwsh
        run: |
          msbuild LanMessenger\LanMessenger.csproj `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:Version=$env:VERSION `
            2>&1 | Tee-Object -FilePath ..\..\build-output-windows.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Optional Authenticode signing — uncomment once CODE_SIGN_CERT / CODE_SIGN_PWD secrets are set:
      # - name: Sign executable
      #   shell: pwsh
      #   run: |
      #     $cert = [System.Convert]::FromBase64String("${{ secrets.CODE_SIGN_CERT }}")
      #     [System.IO.File]::WriteAllBytes("cert.pfx", $cert)
      #     & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
      #       /f cert.pfx /p "${{ secrets.CODE_SIGN_PWD }}" `
      #       /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
      #       "publish-output\LanMessenger.exe"
      #     Remove-Item cert.pfx

      - name: Build Inno Setup installer
        id: package
        shell: pwsh
        run: |
          $InnoPath = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $InnoPath /DMyAppVersion=$env:VERSION LanMessenger.iss 2>&1 |
            Tee-Object -Append -FilePath ..\..\build-output-windows.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $ArtifactName = "LanMessenger-Setup-$env:VERSION.exe"
          $ArtifactPath = "Output\$ArtifactName"
          if (-not (Test-Path $ArtifactPath)) {
            Write-Error "Installer not found: $ArtifactPath"
            Get-ChildItem Output\ -ErrorAction SilentlyContinue
            exit 1
          }

          $Hash = (Get-FileHash $ArtifactPath -Algorithm SHA256).Hash.ToLower()
          echo "artifact_name=$ArtifactName" >> $env:GITHUB_OUTPUT
          echo "sha256=$Hash" >> $env:GITHUB_OUTPUT
          Write-Host "Packaged: $ArtifactName (SHA256: $Hash)"

      - name: Upload artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: src/windows-native/Output/${{ steps.package.outputs.artifact_name }}
          retention-days: 1

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-windows-${{ github.run_id }}
          path: |
            test-output-windows.txt
            build-output-windows.txt
          retention-days: 30

      - name: Report failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          platform: windows
          version: ${{ needs.preflight.outputs.version }}
          failure_type: BUILD_FAILURE
          log_path: build-output-windows.txt
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Startup Smoke Test ────────────────────────────────────────────────────────
  smoke:
    name: Startup Smoke Test
    needs: [preflight, build-test]
    if: |
      needs.build-test.result == 'success' &&
      inputs.skip_smoke != true
    runs-on: windows-2022
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: smoke-artifacts/

      - name: Run startup smoke test
        shell: pwsh
        run: |
          $artifact = Get-ChildItem smoke-artifacts\*.exe | Select-Object -First 1
          scripts\windows\smoke-test.ps1 -ArtifactPath $artifact.FullName

      - name: Collect Windows diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path crash-reports -Force | Out-Null

          $since = (Get-Date).AddMinutes(-10)
          Get-WinEvent -FilterHashtable @{
            LogName   = 'Application'
            StartTime = $since
            Level     = 1, 2
          } -ErrorAction SilentlyContinue |
            Format-List | Out-File crash-reports\event-log.txt

          $DumpDir = "$env:LOCALAPPDATA\CrashDumps"
          if (Test-Path $DumpDir) {
            Copy-Item "$DumpDir\LanMessenger*" crash-reports\ -ErrorAction SilentlyContinue
          }

          Copy-Item smoke.log crash-reports\ -ErrorAction SilentlyContinue

      - name: Upload crash diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-diagnostics-windows-${{ github.run_id }}
          path: crash-reports/
          retention-days: 30

      - name: Report smoke failure
        if: failure()
        uses: ./.github/actions/report-failure
        with:
          platform: windows
          version: ${{ needs.preflight.outputs.version }}
          failure_type: SMOKE_FAILURE
          log_path: crash-reports/event-log.txt
          github_token: ${{ secrets.GITHUB_TOKEN }}

  # ── Publish Platform Release ──────────────────────────────────────────────────
  publish:
    name: Publish Platform Release
    needs: [preflight, build-test, smoke]
    if: |
      needs.build-test.result == 'success' &&
      (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      issues: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: dist/

      - name: Remove existing platform release (force rebuild only)
        if: inputs.force_rebuild == true
        run: |
          TAG="windows-v${VERSION}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Create platform release
        run: |
          TAG="windows-v${VERSION}"
          ARTIFACT=$(ls dist/*.exe | head -1)

          printf '%s\n' \
            "Windows platform build v${VERSION}" \
            "" \
            "Commit: ${{ github.sha }}" \
            "Branch: ${{ github.ref_name }}" \
            "Built:  $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "" \
            "Platform pre-release. Combined release auto-created by Release Orchestration workflow." \
            > /tmp/release-notes.md

          gh release create "$TAG" \
            --title "Windows v${VERSION}" \
            --prerelease \
            --notes-file /tmp/release-notes.md \
            "$ARTIFACT"

          echo "::notice::Published platform release: $TAG"

      - name: Close resolved CI failure issues
        run: |
          chmod +x scripts/shared/close-ci-issues.sh
          GH_TOKEN="${{ secrets.GITHUB_TOKEN }}" \
            scripts/shared/close-ci-issues.sh windows "$VERSION" "${{ github.sha }}"
