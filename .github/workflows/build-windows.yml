name: Build Windows

# Pipeline: preflight → build-test → smoke (major/minor only) → publish

on:
  push:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - 'version/windows.json'
      - 'shared/**'
      - '.github/workflows/build-windows.yml'
      - 'scripts/windows/**'
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild even if version already released'
        type: boolean
        default: false
      skip_smoke:
        description: 'Skip startup smoke test'
        type: boolean
        default: false

# One Windows build at a time — prevents parallel runs from corrupting releases.
concurrency:
  group: build-windows
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  # ── Preflight ─────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_exists: ${{ steps.check.outputs.exists }}
      run_smoke: ${{ steps.bump.outputs.run_smoke }}
    steps:
      - uses: actions/checkout@v4

      - name: Read and validate version
        id: version
        run: |
          VERSION=$(jq -r '.version' version/windows.json)
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
            echo "::error::Invalid semver '$VERSION' in version/windows.json — must match X.Y or X.Y.Z"
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Windows version: $VERSION"

      - name: Check for existing platform release
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="windows-v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" --json tagName &>/dev/null; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "::notice::Release $TAG already exists — skipping (use force_rebuild to override)"
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # Smoke test runs only for major/minor bumps; skipped for patch releases.
      - name: Detect bump type for smoke gate
        id: bump
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          PREV_TAG=$(gh release list --limit 100 \
            --json tagName,createdAt \
            --jq '[.[] | select(.tagName | startswith("windows-v"))] | .[0].tagName // empty' \
            2>/dev/null || true)

          RUN_SMOKE=true
          if [ -n "$PREV_TAG" ]; then
            PREV_VER="${PREV_TAG#windows-v}"
            CUR_MAJ=$(echo "$VERSION"  | cut -d. -f1)
            CUR_MIN=$(echo "$VERSION"  | cut -d. -f2)
            PRV_MAJ=$(echo "$PREV_VER" | cut -d. -f1)
            PRV_MIN=$(echo "$PREV_VER" | cut -d. -f2)
            if [ "$CUR_MAJ" = "$PRV_MAJ" ] && [ "$CUR_MIN" = "$PRV_MIN" ]; then
              RUN_SMOKE=false
            fi
          fi
          echo "run_smoke=$RUN_SMOKE" >> $GITHUB_OUTPUT
          echo "Smoke test: $RUN_SMOKE (previous tag: ${PREV_TAG:-(none)})"

  # ── Test + Build + Package ────────────────────────────────────────────────────
  build-test:
    name: Test, Build & Package
    needs: preflight
    if: |
      needs.preflight.outputs.release_exists == 'false' ||
      inputs.force_rebuild == true
    runs-on: windows-2022
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
    defaults:
      run:
        working-directory: src/windows-native
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # VS MSBuild is required for WinUI 3 (dotnet SDK MSBuild lacks the Windows
      # SDK PRI packaging tasks used by WindowsAppSDK targets).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('src/windows-native/**/*.csproj') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore dependencies
        run: msbuild /t:Restore /p:Configuration=Release /p:Platform=x64 LanMessenger.sln

      # ── Tests ─────────────────────────────────────────────────────────────────
      - name: Build test project
        shell: pwsh
        run: |
          msbuild LanMessenger.Tests\LanMessenger.Tests.csproj `
            /p:Configuration=Release `
            /p:Platform=x64 `
            2>&1 | Tee-Object -FilePath ..\..\test-output-windows.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run unit tests
        shell: pwsh
        run: |
          $testDll = Get-ChildItem -Path "LanMessenger.Tests\bin" `
                       -Filter "LanMessenger.Tests.dll" -Recurse |
                     Select-Object -First 1
          if (-not $testDll) { Write-Error "Test DLL not found under LanMessenger.Tests\bin\"; exit 1 }
          Write-Host "Running tests from: $($testDll.FullName)"
          dotnet vstest $testDll.FullName `
            --logger:"console;verbosity=normal" `
            2>&1 | Tee-Object -Append -FilePath ..\..\test-output-windows.txt
          exit $LASTEXITCODE

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-windows-${{ github.run_id }}
          path: |
            src/windows-native/LanMessenger.Tests/TestResults/
            test-output-windows.txt
          retention-days: 14

      # ── Build ─────────────────────────────────────────────────────────────────
      - name: Publish self-contained app
        shell: pwsh
        run: |
          msbuild LanMessenger\LanMessenger.csproj `
            /t:Publish `
            /p:Configuration=Release `
            /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 `
            /p:SelfContained=true `
            /p:Version=$env:VERSION `
            2>&1 | Tee-Object -FilePath ..\..\build-output-windows.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # App-local VC++ runtime DLLs so libsodium (NSec.Cryptography) loads on
      # clean Windows 10 machines. Windows DLL search order finds DLLs next to
      # the .exe before System32. Microsoft's CRT redistribution license covers this.
      - name: Bundle VC++ runtime DLLs (app-local)
        shell: pwsh
        run: |
          $PublishDir = "LanMessenger\bin\x64\Release\net8.0-windows10.0.19041.0\win-x64\publish"
          if (-not (Test-Path $PublishDir)) {
            Write-Error "Publish dir not found: $PublishDir"
            Get-ChildItem LanMessenger\bin -Recurse -Directory | Select-Object FullName
            exit 1
          }
          foreach ($d in @('vcruntime140.dll','vcruntime140_1.dll','msvcp140.dll')) {
            $src = Join-Path $env:WINDIR "System32\$d"
            if (-not (Test-Path $src)) { Write-Error "Missing runtime DLL: $src"; exit 1 }
            Copy-Item $src -Destination $PublishDir -Force
            Write-Host "Bundled $d into publish output"
          }

      # Optional Authenticode signing — uncomment once CODE_SIGN_CERT / CODE_SIGN_PWD secrets are set:
      # - name: Sign executable
      #   shell: pwsh
      #   run: |
      #     $cert = [System.Convert]::FromBase64String("${{ secrets.CODE_SIGN_CERT }}")
      #     [System.IO.File]::WriteAllBytes("cert.pfx", $cert)
      #     & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
      #       /f cert.pfx /p "${{ secrets.CODE_SIGN_PWD }}" `
      #       /tr http://timestamp.digicert.com /td sha256 /fd sha256 `
      #       "publish-output\LanMessenger.exe"
      #     Remove-Item cert.pfx

      # Inno Setup bundles vc_redist.x64.exe and chain-installs it so SessionCrypto
      # loads on clean Windows 10 boxes (runners have it preinstalled, real users often don't).
      - name: Download VC++ 2015-2022 x64 redistributable
        shell: pwsh
        run: |
          $Dest = "vc_redist.x64.exe"
          Invoke-WebRequest -Uri "https://aka.ms/vs/17/release/vc_redist.x64.exe" -OutFile $Dest -UseBasicParsing
          if (-not (Test-Path $Dest)) { Write-Error "Failed to download vc_redist.x64.exe"; exit 1 }
          Write-Host "Downloaded vc_redist.x64.exe ($((Get-Item $Dest).Length) bytes)"

      - name: Build Inno Setup installer
        id: package
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DMyAppVersion=$env:VERSION LanMessenger.iss `
            2>&1 | Tee-Object -Append -FilePath ..\..\build-output-windows.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          $ArtifactName = "LanMessenger-Setup-$env:VERSION.exe"
          $ArtifactPath = "Output\$ArtifactName"
          if (-not (Test-Path $ArtifactPath)) {
            Write-Error "Installer not found: $ArtifactPath"
            Get-ChildItem Output\ -ErrorAction SilentlyContinue
            exit 1
          }

          $Hash = (Get-FileHash $ArtifactPath -Algorithm SHA256).Hash.ToLower()
          "$Hash  $ArtifactName" | Out-File -FilePath "Output\$ArtifactName.sha256" -Encoding ascii -NoNewline
          "artifact_name=$ArtifactName" >> $env:GITHUB_OUTPUT
          Write-Host "Packaged: $ArtifactName (SHA256: $Hash)"

      - name: Upload artifact for downstream jobs
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: |
            src/windows-native/Output/${{ steps.package.outputs.artifact_name }}
            src/windows-native/Output/${{ steps.package.outputs.artifact_name }}.sha256
          retention-days: 1

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostics-windows-${{ github.run_id }}
          path: |
            test-output-windows.txt
            build-output-windows.txt
          retention-days: 14

  # ── Startup Smoke Test ────────────────────────────────────────────────────────
  # Skipped automatically for patch releases; always skippable via skip_smoke input.
  smoke:
    name: Startup Smoke Test
    needs: [preflight, build-test]
    if: |
      needs.build-test.result == 'success' &&
      needs.preflight.outputs.run_smoke == 'true' &&
      inputs.skip_smoke != true
    runs-on: windows-2022
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: smoke-artifacts/

      - name: Run startup smoke test
        shell: pwsh
        run: |
          $artifact = Get-ChildItem smoke-artifacts\*.exe | Select-Object -First 1
          scripts\windows\smoke-test.ps1 -ArtifactPath $artifact.FullName

      - name: Collect diagnostics on failure
        if: failure()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path crash-reports -Force | Out-Null
          $since = (Get-Date).AddMinutes(-10)
          Get-WinEvent -FilterHashtable @{ LogName='Application'; StartTime=$since; Level=1,2 } `
            -ErrorAction SilentlyContinue | Format-List | Out-File crash-reports\event-log.txt
          $DumpDir = "$env:LOCALAPPDATA\CrashDumps"
          if (Test-Path $DumpDir) { Copy-Item "$DumpDir\LanMessenger*" crash-reports\ -ErrorAction SilentlyContinue }
          Copy-Item smoke.log crash-reports\ -ErrorAction SilentlyContinue
          $clientLogs = Join-Path $env:APPDATA "LanMessenger\Logs"
          if (Test-Path $clientLogs) {
            New-Item -ItemType Directory -Path crash-reports\client-logs -Force | Out-Null
            Copy-Item "$clientLogs\*" crash-reports\client-logs\ -ErrorAction SilentlyContinue
          }

      - name: Upload diagnostics on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-diagnostics-windows-${{ github.run_id }}
          path: crash-reports/
          retention-days: 14

  # ── Publish Platform Release ──────────────────────────────────────────────────
  publish:
    name: Publish Release
    needs: [preflight, build-test, smoke]
    if: |
      always() &&
      needs.build-test.result == 'success' &&
      (needs.smoke.result == 'success' || needs.smoke.result == 'skipped')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
      actions: write
    env:
      VERSION: ${{ needs.preflight.outputs.version }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-build-${{ github.run_id }}
          path: dist/

      - name: Remove existing platform release (force rebuild only)
        if: inputs.force_rebuild == true
        run: |
          TAG="windows-v${VERSION}"
          gh release delete "$TAG" --yes 2>/dev/null || true
          git push origin ":refs/tags/$TAG" 2>/dev/null || true

      - name: Generate release notes
        run: |
          chmod +x scripts/shared/generate-release-notes.sh
          scripts/shared/generate-release-notes.sh windows "$VERSION" > /tmp/release-notes.md
          cat /tmp/release-notes.md

      - name: Append download info to release notes
        run: |
          {
            echo ""
            echo "---"
            echo ""
            echo "**Windows v${VERSION}** — platform pre-release"
            echo ""
            echo "Self-contained installer for Windows 10 19041+ (x64). Includes the VC++ 2015-2022 runtime."
            echo ""
            echo "Each installer ships with a matching \`.sha256\` sidecar."
          } >> /tmp/release-notes.md

      - name: Create platform release
        run: |
          TAG="windows-v${VERSION}"
          ARTIFACT=$(ls dist/*.exe | head -1)
          SIDECAR="${ARTIFACT}.sha256"
          ASSETS=("$ARTIFACT")
          [ -f "$SIDECAR" ] && ASSETS+=("$SIDECAR")

          gh release create "$TAG" \
            --title "Windows v${VERSION}" \
            --prerelease \
            --notes-file /tmp/release-notes.md \
            "${ASSETS[@]}"

          echo "::notice::Published $TAG with ${#ASSETS[@]} asset(s)"

      # Assets are already attached to the GitHub Release above — the Actions
      # artifact copy is redundant CI byproduct. Delete it immediately instead
      # of waiting out retention-days, so build artifacts never accumulate
      # against the account-wide Actions storage quota.
      - name: Delete build artifact (already published to release)
        if: always()
        run: |
          gh api "repos/${{ github.repository }}/actions/artifacts?name=windows-build-${{ github.run_id }}" \
            --jq '.artifacts[].id' | while read -r id; do
            gh api -X DELETE "repos/${{ github.repository }}/actions/artifacts/$id" && \
              echo "Deleted artifact $id" || echo "::warning::Failed to delete artifact $id"
          done
