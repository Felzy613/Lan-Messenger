name: Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'src/macos/**'
      - 'src/windows-native/**'
      - '.github/workflows/release.yml'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-15
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: src/macos
        run: xcodegen generate --spec project.yml --project .

      - name: Set version
        id: version
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Build
        working-directory: src/macos
        run: |
          xcodebuild \
            -project LanMessenger.xcodeproj \
            -scheme  LanMessenger \
            -configuration Release \
            -derivedDataPath build/derived \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Import signing certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE }}
          P12_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PWD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -hex 20)"

          echo "$CERTIFICATE_BASE64" | base64 -D -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12

          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN_PATH"

          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

          echo "=== Available signing identities ==="
          security find-identity -v -p codesigning

      - name: Sign .app
        run: |
          APP=$(find "$GITHUB_WORKSPACE/src/macos/build/derived" \
            \( -name "LanMessenger.app" -o -name "LAN Messenger.app" \) | head -1)
          echo "Signing: $APP"
          codesign --deep --force --options runtime \
            --sign "Apple Development: davefelzy20@gmail.com (7FAZT3258V)" \
            --entitlements "$GITHUB_WORKSPACE/src/macos/LanMessenger/LanMessenger.entitlements" \
            "$APP"
          codesign --verify --deep --strict "$APP" && echo "✅ Signature valid"
          echo "APP_PATH=$APP" >> $GITHUB_ENV
          echo "APP_NAME=$(basename "$APP")" >> $GITHUB_ENV

      - name: Zip .app
        run: |
          cd "$(dirname "$APP_PATH")"
          zip -r --symlinks \
            "$GITHUB_WORKSPACE/LanMessenger-macOS-${{ steps.version.outputs.version }}.zip" \
            "$APP_NAME"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: LanMessenger-macOS-${{ steps.version.outputs.version }}.zip

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/signing.keychain-db" || true

  build-windows:
    runs-on: windows-2022
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set version
        id: version
        shell: bash
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Restore
        working-directory: src/windows-native
        run: msbuild LanMessenger.sln /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Publish
        working-directory: src/windows-native
        run: >
          msbuild LanMessenger/LanMessenger.csproj
          /t:Publish
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:SelfContained=true

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion=${{ steps.version.outputs.version }} "src\windows-native\LanMessenger.iss"

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: src/windows-native/Output/LanMessenger-Setup-${{ steps.version.outputs.version }}.exe

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.build-macos.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --repo "${{ github.repository }}" \
            --title "LAN Messenger v$VERSION" \
            --generate-notes \
            "macos-build/LanMessenger-macOS-$VERSION.zip" \
            "windows-build/LanMessenger-Setup-$VERSION.exe"
