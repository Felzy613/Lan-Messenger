name: Release Orchestration

# Triggers whenever either platform build completes successfully on main.
# Finds the latest per-platform pre-releases, validates both exist, then
# creates an atomic combined release containing both installers.
#
# Race-condition safety: when both platforms are built from the same commit,
# whichever finishes first waits up to 45 minutes for the sibling build before
# proceeding. The second queued instance hits the idempotency check and exits.

on:
  workflow_run:
    workflows: ['Build macOS', 'Build Windows']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-orchestration
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  orchestrate:
    name: Create Combined Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Exit immediately if a combined release for the current version pair
      # was already published by a concurrent orchestration instance.
      - name: Check if combined release already exists
        id: early_exit
        run: |
          MAC_VER=$(jq -r '.version' version/macos.json 2>/dev/null || echo "")
          WIN_VER=$(jq -r '.version' version/windows.json 2>/dev/null || echo "")
          if [ -n "$MAC_VER" ] && [ -n "$WIN_VER" ]; then
            COMBINED_TAG="release-win${WIN_VER}-mac${MAC_VER}"
            if gh release view "$COMBINED_TAG" --json tagName &>/dev/null; then
              echo "::notice::$COMBINED_TAG already published — nothing to do"
              echo "skip=true" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      # When both platforms change in the same commit, one build finishes first.
      # Wait up to 45 minutes for the sibling build so we don't pair a new
      # artifact with a stale one from the other platform.
      - name: Wait for sibling platform build
        if: |
          steps.early_exit.outputs.skip != 'true' &&
          github.event_name != 'workflow_dispatch'
        env:
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          if [[ "$TRIGGER_WORKFLOW" == *"macOS"* ]]; then
            OTHER="Build Windows"
          elif [[ "$TRIGGER_WORKFLOW" == *"Windows"* ]]; then
            OTHER="Build macOS"
          else
            echo "Unknown trigger — skipping sibling wait"
            exit 0
          fi

          echo "Waiting for '$OTHER' on commit ${TRIGGER_SHA:0:8}..."
          MAX_WAIT=2700   # 45 minutes
          ELAPSED=0

          while true; do
            STATUS=$(gh run list --workflow "$OTHER" --branch main \
              --json status,headSha --limit 20 \
              | jq -r ".[] | select(.headSha == \"$TRIGGER_SHA\") | .status" | head -1)

            if [ -z "$STATUS" ]; then
              echo "No '$OTHER' run found for this commit — proceeding"
              break
            fi
            echo "  '$OTHER' status: $STATUS (${ELAPSED}s elapsed)"
            case "$STATUS" in
              in_progress|queued|waiting|requested|pending) ;;
              *) echo "  '$OTHER' finished: $STATUS"; break ;;
            esac

            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "::warning::Timed out waiting for '$OTHER' — proceeding with latest artifact"
              break
            fi
            sleep 30
            ELAPSED=$((ELAPSED + 30))
          done

      - name: Find latest per-platform releases
        id: tags
        if: steps.early_exit.outputs.skip != 'true'
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse')

          MAC_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("macos-v"))] | first | .tagName // empty')
          WIN_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("windows-v"))] | first | .tagName // empty')

          echo "Latest macOS:   ${MAC_TAG:-(none)}"
          echo "Latest Windows: ${WIN_TAG:-(none)}"
          echo "mac_tag=$MAC_TAG" >> $GITHUB_OUTPUT
          echo "win_tag=$WIN_TAG" >> $GITHUB_OUTPUT

          if [ -z "$MAC_TAG" ]; then
            echo "::warning::No macOS platform release found — waiting for macOS build"
            echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ -z "$WIN_TAG" ]; then
            echo "::warning::No Windows platform release found — waiting for Windows build"
            echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Compute combined release tag
        id: release
        if: steps.early_exit.outputs.skip != 'true' && steps.tags.outputs.skip != 'true'
        run: |
          MAC_VER="${{ steps.tags.outputs.mac_tag }}"; MAC_VER="${MAC_VER#macos-v}"
          WIN_VER="${{ steps.tags.outputs.win_tag }}"; WIN_VER="${WIN_VER#windows-v}"
          COMBINED_TAG="release-win${WIN_VER}-mac${MAC_VER}"

          echo "combined_tag=$COMBINED_TAG"           >> $GITHUB_OUTPUT
          echo "release_title=LAN Messenger — Windows ${WIN_VER} | macOS ${MAC_VER}" >> $GITHUB_OUTPUT
          echo "mac_ver=$MAC_VER"                     >> $GITHUB_OUTPUT
          echo "win_ver=$WIN_VER"                     >> $GITHUB_OUTPUT

          if gh release view "$COMBINED_TAG" --json tagName &>/dev/null; then
            echo "::notice::$COMBINED_TAG already exists — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download platform installers
        if: |
          steps.early_exit.outputs.skip != 'true' &&
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          mkdir -p dist/macos dist/windows

          # Combined release exposes only the two user-facing installers (.pkg, .exe).
          # Update-channel artifacts (.zip, .sha256s) stay on per-platform pre-releases;
          # the in-app updater finds them automatically via per-platform tags.
          gh release download "${{ steps.tags.outputs.mac_tag }}" \
            --pattern "*.pkg" --dir dist/macos/
          gh release download "${{ steps.tags.outputs.win_tag }}" \
            --pattern "*.exe" --dir dist/windows/

          echo "Downloaded:"
          ls -lh dist/macos/ dist/windows/

      - name: Validate artifact sizes
        if: |
          steps.early_exit.outputs.skip != 'true' &&
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          MAC_PKG=$(ls dist/macos/*.pkg 2>/dev/null | head -1)
          WIN_EXE=$(ls dist/windows/*.exe 2>/dev/null | head -1)
          [ -z "$MAC_PKG" ] && { echo "::error::macOS .pkg missing"; exit 1; }
          [ -z "$WIN_EXE" ] && { echo "::error::Windows .exe missing"; exit 1; }

          for F in "$MAC_PKG" "$WIN_EXE"; do
            SIZE=$(stat -c%s "$F" 2>/dev/null || stat -f%z "$F")
            [ "$SIZE" -lt 524288 ] && { echo "::error::Suspiciously small artifact: $F ($SIZE bytes)"; exit 1; }
            echo "✓ $(basename "$F") ($(numfmt --to=iec "$SIZE" 2>/dev/null || echo "${SIZE} bytes"))"
          done

      - name: Generate combined release notes
        id: changelog
        if: |
          steps.early_exit.outputs.skip != 'true' &&
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          chmod +x scripts/shared/generate-release-notes.sh
          scripts/shared/generate-release-notes.sh combined \
            "${{ steps.release.outputs.mac_ver }}" > /tmp/combined-changelog.md
          echo "Changelog:"
          cat /tmp/combined-changelog.md

      - name: Create combined release
        id: draft
        if: |
          steps.early_exit.outputs.skip != 'true' &&
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        env:
          TAG: ${{ steps.release.outputs.combined_tag }}
          MAC_VER: ${{ steps.release.outputs.mac_ver }}
          WIN_VER: ${{ steps.release.outputs.win_ver }}
          MAC_TAG: ${{ steps.tags.outputs.mac_tag }}
          WIN_TAG: ${{ steps.tags.outputs.win_tag }}
        run: |
          CHANGELOG=$(cat /tmp/combined-changelog.md 2>/dev/null || true)

          {
            if [ -n "$CHANGELOG" ]; then
              echo "## What's New"
              echo ""
              printf '%s\n' "$CHANGELOG"
              echo ""
            fi
            echo "---"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Installer | Requirements |"
            echo "|----------|-----------|--------------|"
            echo "| 🍎 **macOS** | \`LanMessenger-macOS-${MAC_VER}.pkg\` | macOS 13+, double-click to install |"
            echo "| 🪟 **Windows** | \`LanMessenger-Setup-${WIN_VER}.exe\` | Windows 10 19041+ (x64), VC++ runtime bundled |"
            echo ""
            echo "> **For IT / advanced users:** The \`.pkg\` is MDM/JAMF/Munki compatible."
            echo "> The in-app updater uses per-platform pre-releases"
            echo "> ([\`${MAC_TAG}\`](../../releases/tag/${MAC_TAG}), [\`${WIN_TAG}\`](../../releases/tag/${WIN_TAG}))"
            echo "> and finds updates automatically — end users only need the files above."
          } > /tmp/combined-notes.md

          # Create as draft first — upload assets — then publish atomically.
          gh release create "$TAG" \
            --title "${{ steps.release.outputs.release_title }}" \
            --draft \
            --notes-file /tmp/combined-notes.md

          echo "draft_tag=$TAG" >> $GITHUB_OUTPUT

          gh release upload "$TAG" dist/macos/*.pkg  --clobber
          gh release upload "$TAG" dist/windows/*.exe --clobber
          gh release edit "$TAG" --draft=false

          echo "::notice::Published: ${{ steps.release.outputs.release_title }} ($TAG)"

      # Safety net: if any step above failed after the draft was created, clean it up
      # so the previous stable release stays as the latest visible release.
      - name: Delete draft on failure
        if: failure() && steps.draft.outputs.draft_tag != ''
        run: |
          echo "::warning::Cleaning up failed draft: ${{ steps.draft.outputs.draft_tag }}"
          gh release delete "${{ steps.draft.outputs.draft_tag }}" --yes 2>/dev/null || true
