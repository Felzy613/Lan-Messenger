name: Release

# Triggered manually when you are ready to cut a versioned release.
# Fetches the latest successful artifact from each platform's rolling
# pre-release and bundles them into a single GitHub Release.
#
# To trigger: Actions → Release → Run workflow → enter a tag such as v2026.05.10

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v2026.05.10)'
        required: true
      title:
        description: 'Release title (defaults to tag if omitted)'
        required: false

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      # Read each platform's current version so we can display them in the
      # release notes even when only one platform was rebuilt this cycle.
      - name: Read platform versions
        id: versions
        run: |
          MACOS_VERSION=$(cat src/macos/VERSION | tr -d '[:space:]')
          WIN_VERSION=$(cat src/windows-native/VERSION | tr -d '[:space:]')
          echo "macos=$MACOS_VERSION"   >> $GITHUB_OUTPUT
          echo "windows=$WIN_VERSION"  >> $GITHUB_OUTPUT
          echo "macOS v$MACOS_VERSION | Windows v$WIN_VERSION"

      # Download the artifact stored by the latest build-macos.yml run.
      # The rolling-macos pre-release is updated on every successful macOS build.
      - name: Download latest macOS artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/macos
          gh release download rolling-macos \
            --repo "${{ github.repository }}" \
            --dir  artifacts/macos
          echo "macOS artifact:"
          ls -lh artifacts/macos/

      # Download the artifact stored by the latest build-windows.yml run.
      - name: Download latest Windows artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/windows
          gh release download rolling-windows \
            --repo "${{ github.repository }}" \
            --dir  artifacts/windows
          echo "Windows artifact:"
          ls -lh artifacts/windows/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG:   ${{ inputs.tag }}
          TITLE: ${{ inputs.title }}
          MACOS_VERSION:   ${{ steps.versions.outputs.macos }}
          WIN_VERSION:     ${{ steps.versions.outputs.windows }}
        run: |
          RELEASE_TITLE="${TITLE:-$TAG}"
          MACOS_FILE=$(find artifacts/macos   -type f | head -1)
          WIN_FILE=$(find   artifacts/windows -type f | head -1)

          gh release create "$TAG" \
            --repo  "${{ github.repository }}" \
            --title "$RELEASE_TITLE" \
            --notes "## LAN Messenger $TAG

          | Platform | Version |
          |----------|---------|
          | macOS    | v${MACOS_VERSION} |
          | Windows  | v${WIN_VERSION} |

          Both installers are attached below. Download the one for your platform." \
            "$MACOS_FILE" \
            "$WIN_FILE"
