name: Release Orchestration

# Triggers whenever either platform build completes successfully on main,
# or on manual dispatch. Finds the latest per-platform pre-releases and
# creates an atomic combined release containing both installers.
#
# Idempotency: skips if a combined release for the current artifact pair
# already exists. No sibling-wait — if one platform is behind, the combined
# release reflects that, and a newer combined release is created when that
# platform catches up.

on:
  workflow_run:
    workflows: ['Build macOS', 'Build Windows']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: release-orchestration
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  orchestrate:
    name: Create Combined Release
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Find the latest successfully published platform pre-releases.
      # Uses the most-recent available release rather than requiring an exact
      # version match against the version files — that way a stalled platform
      # build never permanently blocks the combined release.
      - name: Find latest per-platform releases
        id: releases
        run: |
          RELEASES=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse')

          MAC_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("macos-v"))] | .[0].tagName // empty')
          WIN_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("windows-v"))] | .[0].tagName // empty')

          if [ -z "$MAC_TAG" ]; then
            echo "::warning::No macOS platform release found — skipping until a macOS build publishes"
            echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi
          if [ -z "$WIN_TAG" ]; then
            echo "::warning::No Windows platform release found — skipping until a Windows build publishes"
            echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi

          MAC_VER="${MAC_TAG#macos-v}"
          WIN_VER="${WIN_TAG#windows-v}"
          COMBINED_TAG="release-win${WIN_VER}-mac${MAC_VER}"

          # Idempotency: skip if this exact combined release already exists.
          if gh release view "$COMBINED_TAG" --json tagName &>/dev/null; then
            echo "::notice::$COMBINED_TAG already published — nothing to do"
            echo "skip=true" >> $GITHUB_OUTPUT; exit 0
          fi

          # Warn when platform releases lag behind version files.
          EXPECTED_MAC=$(jq -r '.version // empty' version/macos.json)
          EXPECTED_WIN=$(jq -r '.version // empty' version/windows.json)
          [ "$MAC_VER" != "$EXPECTED_MAC" ] && \
            echo "::warning::macOS release $MAC_TAG lags behind version/macos.json ($EXPECTED_MAC) — run Build macOS to catch up"
          [ "$WIN_VER" != "$EXPECTED_WIN" ] && \
            echo "::warning::Windows release $WIN_TAG lags behind version/windows.json ($EXPECTED_WIN) — run Build Windows to catch up"

          echo "mac_tag=$MAC_TAG"             >> $GITHUB_OUTPUT
          echo "win_tag=$WIN_TAG"             >> $GITHUB_OUTPUT
          echo "mac_ver=$MAC_VER"             >> $GITHUB_OUTPUT
          echo "win_ver=$WIN_VER"             >> $GITHUB_OUTPUT
          echo "combined_tag=$COMBINED_TAG"   >> $GITHUB_OUTPUT
          echo "release_title=LAN Messenger — Windows ${WIN_VER} | macOS ${MAC_VER}" >> $GITHUB_OUTPUT
          echo "skip=false"                   >> $GITHUB_OUTPUT

          echo "macOS:   $MAC_TAG"
          echo "Windows: $WIN_TAG"
          echo "Combined: $COMBINED_TAG"

      - name: Download platform installers
        if: steps.releases.outputs.skip != 'true'
        run: |
          mkdir -p dist/macos dist/windows
          gh release download "${{ steps.releases.outputs.mac_tag }}" \
            --pattern "*.pkg" --dir dist/macos/
          gh release download "${{ steps.releases.outputs.win_tag }}" \
            --pattern "*.exe" --dir dist/windows/
          echo "Downloaded:"
          ls -lh dist/macos/ dist/windows/

      - name: Validate artifact sizes
        if: steps.releases.outputs.skip != 'true'
        run: |
          MAC_PKG=$(ls dist/macos/*.pkg 2>/dev/null | head -1)
          WIN_EXE=$(ls dist/windows/*.exe 2>/dev/null | head -1)
          [ -z "$MAC_PKG" ] && { echo "::error::macOS .pkg missing"; exit 1; }
          [ -z "$WIN_EXE" ] && { echo "::error::Windows .exe missing"; exit 1; }
          for F in "$MAC_PKG" "$WIN_EXE"; do
            SIZE=$(stat -c%s "$F" 2>/dev/null || stat -f%z "$F")
            [ "$SIZE" -lt 524288 ] && { echo "::error::Suspiciously small artifact: $F ($SIZE bytes)"; exit 1; }
            echo "✓ $(basename "$F") ($(numfmt --to=iec "$SIZE" 2>/dev/null || echo "${SIZE} bytes"))"
          done

      - name: Generate combined release notes
        if: steps.releases.outputs.skip != 'true'
        env:
          TRIGGER_WORKFLOW: ${{ github.event.workflow_run.name }}
        run: |
          # Changelog boundary: the previous release of whichever platform just built.
          # This means "what's new" shows only the commits for this specific build,
          # not everything accumulated since the last combined release.
          #
          # e.g. Windows 1.6.12 triggers → boundary = windows-v1.6.11 → one build's changes.
          # workflow_dispatch fallback → use most recently published platform's predecessor.
          RELEASES=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse')

          PREV_BOUNDARY=""

          if [[ "$TRIGGER_WORKFLOW" == *"Windows"* ]]; then
            PREV_BOUNDARY=$(echo "$RELEASES" | jq -r \
              '[.[] | select(.tagName | startswith("windows-v"))] | .[1].tagName // empty')
          elif [[ "$TRIGGER_WORKFLOW" == *"macOS"* ]]; then
            PREV_BOUNDARY=$(echo "$RELEASES" | jq -r \
              '[.[] | select(.tagName | startswith("macos-v"))] | .[1].tagName // empty')
          fi

          # workflow_dispatch: infer from most recently published platform release
          if [ -z "$PREV_BOUNDARY" ]; then
            RECENT=$(echo "$RELEASES" | jq -r \
              '[.[] | select(.tagName | (startswith("macos-v") or startswith("windows-v")))] | .[0].tagName // empty')
            if [[ "$RECENT" == windows-v* ]]; then
              PREV_BOUNDARY=$(echo "$RELEASES" | jq -r \
                '[.[] | select(.tagName | startswith("windows-v"))] | .[1].tagName // empty')
            elif [[ "$RECENT" == macos-v* ]]; then
              PREV_BOUNDARY=$(echo "$RELEASES" | jq -r \
                '[.[] | select(.tagName | startswith("macos-v"))] | .[1].tagName // empty')
            fi
          fi

          # Last resort: previous combined release
          if [ -z "$PREV_BOUNDARY" ]; then
            PREV_BOUNDARY=$(echo "$RELEASES" | jq -r \
              '[.[] | select(.tagName | startswith("release-"))] | .[0].tagName // empty')
          fi

          chmod +x scripts/shared/generate-release-notes.sh
          if [ -n "$PREV_BOUNDARY" ]; then
            echo "Generating changelog since: $PREV_BOUNDARY"
            scripts/shared/generate-release-notes.sh combined \
              "${{ steps.releases.outputs.mac_ver }}" \
              "$PREV_BOUNDARY" > /tmp/combined-changelog.md
          else
            scripts/shared/generate-release-notes.sh combined \
              "${{ steps.releases.outputs.mac_ver }}" > /tmp/combined-changelog.md
          fi
          cat /tmp/combined-changelog.md

      - name: Create combined release
        id: draft
        if: steps.releases.outputs.skip != 'true'
        env:
          TAG: ${{ steps.releases.outputs.combined_tag }}
          MAC_VER: ${{ steps.releases.outputs.mac_ver }}
          WIN_VER: ${{ steps.releases.outputs.win_ver }}
          MAC_TAG: ${{ steps.releases.outputs.mac_tag }}
          WIN_TAG: ${{ steps.releases.outputs.win_tag }}
        run: |
          CHANGELOG=$(cat /tmp/combined-changelog.md 2>/dev/null || true)

          {
            if [ -n "$CHANGELOG" ]; then
              echo "## What's New"
              echo ""
              printf '%s\n' "$CHANGELOG"
              echo ""
            fi
            echo "---"
            echo ""
            echo "## Downloads"
            echo ""
            echo "| Platform | Installer | Requirements |"
            echo "|----------|-----------|--------------|"
            echo "| 🍎 **macOS** | \`LanMessenger-macOS-${MAC_VER}.pkg\` | macOS 13+, double-click to install |"
            echo "| 🪟 **Windows** | \`LanMessenger-Setup-${WIN_VER}.exe\` | Windows 10 19041+ (x64), VC++ runtime bundled |"
            echo ""
            echo "> **For IT / advanced users:** The \`.pkg\` is MDM/JAMF/Munki compatible."
            echo "> The in-app updater uses per-platform pre-releases"
            echo "> ([\`${MAC_TAG}\`](../../releases/tag/${MAC_TAG}), [\`${WIN_TAG}\`](../../releases/tag/${WIN_TAG}))"
            echo "> and finds updates automatically — end users only need the files above."
          } > /tmp/combined-notes.md

          # Create as draft first — upload assets — then publish atomically.
          gh release create "$TAG" \
            --title "${{ steps.releases.outputs.release_title }}" \
            --draft \
            --notes-file /tmp/combined-notes.md

          echo "draft_tag=$TAG" >> $GITHUB_OUTPUT

          gh release upload "$TAG" dist/macos/*.pkg  --clobber
          gh release upload "$TAG" dist/windows/*.exe --clobber
          gh release edit "$TAG" --draft=false

          echo "::notice::Published: ${{ steps.releases.outputs.release_title }} ($TAG)"

      # Safety net: if any step above failed after the draft was created, clean it up.
      - name: Delete draft on failure
        if: failure() && steps.draft.outputs.draft_tag != ''
        run: |
          echo "::warning::Cleaning up failed draft: ${{ steps.draft.outputs.draft_tag }}"
          gh release delete "${{ steps.draft.outputs.draft_tag }}" --yes 2>/dev/null || true
