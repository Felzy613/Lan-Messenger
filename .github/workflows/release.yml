name: Release Orchestration

# Triggers whenever either platform build completes successfully on main.
# Finds the latest per-platform releases, validates both exist, then creates
# an atomic combined release containing both artifacts.
#
# Race-condition safety: when both platforms are built from the same commit,
# whichever finishes first waits up to 45 minutes for the sibling build to
# complete before proceeding. This prevents pairing a new artifact with a
# stale one from the other platform.
on:
  workflow_run:
    workflows: ['Build macOS', 'Build Windows']
    types: [completed]
    branches: [main]
  workflow_dispatch: {}

# Serialize release creation — if both builds finish nearly simultaneously,
# the second instance queues and then hits the idempotency check and exits.
concurrency:
  group: release-orchestration
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  orchestrate:
    name: Create Combined Release
    runs-on: ubuntu-latest
    # Proceed when triggered by a successful build or manually dispatched
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 60
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Identify triggering platform
        id: platform
        run: |
          WORKFLOW="${{ github.event.workflow_run.name }}"
          echo "Triggered by: $WORKFLOW"
          if [[ "$WORKFLOW" == *"macOS"* ]]; then
            echo "rebuilt=macos" >> $GITHUB_OUTPUT
            echo "other_workflow=Build Windows" >> $GITHUB_OUTPUT
          elif [[ "$WORKFLOW" == *"Windows"* ]]; then
            echo "rebuilt=windows" >> $GITHUB_OUTPUT
            echo "other_workflow=Build macOS" >> $GITHUB_OUTPUT
          else
            echo "rebuilt=unknown" >> $GITHUB_OUTPUT
            echo "other_workflow=" >> $GITHUB_OUTPUT
          fi

      # ── Wait for sibling build ───────────────────────────────────────────────
      # When both platforms are changed in the same commit, one build will finish
      # first and reach here while the other is still compiling. We poll GitHub's
      # API every 30 s for up to 45 min waiting for the sibling to finish.
      # If no sibling run exists for this commit, we skip the wait immediately.
      - name: Wait for sibling platform build
        if: |
          github.event_name != 'workflow_dispatch' &&
          steps.platform.outputs.other_workflow != ''
        env:
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
          OTHER_WORKFLOW: ${{ steps.platform.outputs.other_workflow }}
        run: |
          echo "Commit: $TRIGGER_SHA"
          echo "Checking if '$OTHER_WORKFLOW' is building this commit..."

          MAX_WAIT=2700   # 45 minutes
          ELAPSED=0
          POLL=30

          while true; do
            STATUS=$(gh run list \
              --workflow "$OTHER_WORKFLOW" \
              --branch main \
              --json status,headSha \
              --limit 20 \
              | jq -r ".[] | select(.headSha == \"$TRIGGER_SHA\") | .status" \
              | head -1)

            if [ -z "$STATUS" ]; then
              echo "No '$OTHER_WORKFLOW' run found for this commit — proceeding immediately"
              break
            fi

            echo "  '$OTHER_WORKFLOW' status: $STATUS (elapsed: ${ELAPSED}s)"

            case "$STATUS" in
              in_progress|queued|waiting|requested|pending)
                ;;
              *)
                echo "  '$OTHER_WORKFLOW' finished with: $STATUS"
                break
                ;;
            esac

            if [ $ELAPSED -ge $MAX_WAIT ]; then
              echo "::warning::Waited ${MAX_WAIT}s for '$OTHER_WORKFLOW' — proceeding with latest available artifact"
              break
            fi

            sleep $POLL
            ELAPSED=$((ELAPSED + POLL))
          done

      - name: Find latest per-platform releases
        id: tags
        run: |
          # Fetch all releases sorted newest-first
          RELEASES=$(gh release list \
            --limit 100 \
            --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse')

          MAC_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("macos-v"))] | first | .tagName // empty')

          WIN_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("windows-v"))] | first | .tagName // empty')

          echo "Latest macOS release:   ${MAC_TAG:-(none)}"
          echo "Latest Windows release: ${WIN_TAG:-(none)}"

          echo "mac_tag=$MAC_TAG" >> $GITHUB_OUTPUT
          echo "win_tag=$WIN_TAG" >> $GITHUB_OUTPUT

          # Skip gracefully if either platform has never been built yet
          if [ -z "$MAC_TAG" ]; then
            echo "::warning::No macOS platform release found — skipping combined release until macOS has been built"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ -z "$WIN_TAG" ]; then
            echo "::warning::No Windows platform release found — skipping combined release until Windows has been built"
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          echo "skip=false" >> $GITHUB_OUTPUT

      - name: Compute combined release tag
        id: release
        if: steps.tags.outputs.skip != 'true'
        run: |
          MAC_VER="${{ steps.tags.outputs.mac_tag }}"
          WIN_VER="${{ steps.tags.outputs.win_tag }}"
          MAC_VER="${MAC_VER#macos-v}"
          WIN_VER="${WIN_VER#windows-v}"

          COMBINED_TAG="release-win${WIN_VER}-mac${MAC_VER}"
          RELEASE_TITLE="LAN Messenger — Windows ${WIN_VER} | macOS ${MAC_VER}"

          echo "combined_tag=$COMBINED_TAG" >> $GITHUB_OUTPUT
          echo "release_title=$RELEASE_TITLE" >> $GITHUB_OUTPUT
          echo "mac_ver=$MAC_VER" >> $GITHUB_OUTPUT
          echo "win_ver=$WIN_VER" >> $GITHUB_OUTPUT
          echo "Combined tag: $COMBINED_TAG"

          # Idempotent: skip if this exact version combo already released
          if gh release view "$COMBINED_TAG" --json tagName &>/dev/null; then
            echo "::notice::Combined release $COMBINED_TAG already exists — skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Download both platform artifacts
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          mkdir -p dist/macos dist/windows

          gh release download "${{ steps.tags.outputs.mac_tag }}" \
            --pattern "*.zip" \
            --dir dist/macos/

          gh release download "${{ steps.tags.outputs.win_tag }}" \
            --pattern "*.exe" \
            --dir dist/windows/

          echo "Downloaded artifacts:"
          ls -lh dist/macos/ dist/windows/

      - name: Validate artifact integrity
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          MAC_FILE=$(ls dist/macos/*.zip 2>/dev/null | head -1)
          WIN_FILE=$(ls dist/windows/*.exe 2>/dev/null | head -1)

          if [ -z "$MAC_FILE" ]; then
            echo "::error::macOS artifact missing after download"
            exit 1
          fi
          if [ -z "$WIN_FILE" ]; then
            echo "::error::Windows artifact missing after download"
            exit 1
          fi

          # Sanity-check file sizes (both must be > 512 KiB)
          MAC_SIZE=$(stat -c%s "$MAC_FILE" 2>/dev/null || stat -f%z "$MAC_FILE")
          WIN_SIZE=$(stat -c%s "$WIN_FILE" 2>/dev/null || stat -f%z "$WIN_FILE")

          if [ "$MAC_SIZE" -lt 524288 ]; then
            echo "::error::macOS artifact is suspiciously small (${MAC_SIZE} bytes)"
            exit 1
          fi
          if [ "$WIN_SIZE" -lt 524288 ]; then
            echo "::error::Windows artifact is suspiciously small (${WIN_SIZE} bytes)"
            exit 1
          fi

          echo "✓ macOS: $(basename $MAC_FILE) ($(numfmt --to=iec $MAC_SIZE))"
          echo "✓ Windows: $(basename $WIN_FILE) ($(numfmt --to=iec $WIN_SIZE))"

      - name: Fetch per-platform commit SHAs for release notes
        id: commits
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          MAC_SHA=$(gh release view "${{ steps.tags.outputs.mac_tag }}" \
            --json targetCommitish -q .targetCommitish | head -c 8 || echo "unknown")
          WIN_SHA=$(gh release view "${{ steps.tags.outputs.win_tag }}" \
            --json targetCommitish -q .targetCommitish | head -c 8 || echo "unknown")
          echo "mac_sha=$MAC_SHA" >> $GITHUB_OUTPUT
          echo "win_sha=$WIN_SHA" >> $GITHUB_OUTPUT

      - name: Create DRAFT combined release
        id: draft
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          TAG="${{ steps.release.outputs.combined_tag }}"
          MAC_VER="${{ steps.release.outputs.mac_ver }}"
          WIN_VER="${{ steps.release.outputs.win_ver }}"
          MAC_SHA="${{ steps.commits.outputs.mac_sha }}"
          WIN_SHA="${{ steps.commits.outputs.win_sha }}"

          printf '%s\n' \
            "LAN Messenger Combined Release" \
            "" \
            "Windows ${WIN_VER} (${WIN_SHA}) + macOS ${MAC_VER} (${MAC_SHA})" \
            "Released: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "Triggered by: ${{ github.event.workflow_run.name }}" \
            "" \
            "Windows Installer: LanMessenger-Setup-${WIN_VER}.exe" \
            "  Self-contained (.NET 8 bundled). Requires Windows 10 build 19041+, x64." \
            "" \
            "macOS App: LanMessenger-macOS-${MAC_VER}.zip" \
            "  Requires macOS 13.0 (Ventura)+. Unzip and move to Applications." \
            > /tmp/combined-notes.md

          gh release create "$TAG" \
            --title "${{ steps.release.outputs.release_title }}" \
            --draft \
            --notes-file /tmp/combined-notes.md

          echo "draft_tag=$TAG" >> $GITHUB_OUTPUT
          echo "Created draft release: $TAG"

      - name: Upload macOS artifact
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          gh release upload "${{ steps.draft.outputs.draft_tag }}" \
            dist/macos/*.zip \
            --clobber

      - name: Upload Windows artifact
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          gh release upload "${{ steps.draft.outputs.draft_tag }}" \
            dist/windows/*.exe \
            --clobber

      - name: Publish release (remove draft status)
        if: |
          steps.tags.outputs.skip != 'true' &&
          steps.release.outputs.skip != 'true'
        run: |
          gh release edit "${{ steps.draft.outputs.draft_tag }}" --draft=false
          echo "::notice::Published: ${{ steps.release.outputs.release_title }} (${{ steps.draft.outputs.draft_tag }})"

      # Safety net: if any step above failed after the draft was created, delete it
      # so the previous stable release remains the latest visible release.
      - name: Delete draft release on failure
        if: failure() && steps.draft.outputs.draft_tag != ''
        run: |
          echo "::warning::Cleaning up failed draft release ${{ steps.draft.outputs.draft_tag }}"
          gh release delete "${{ steps.draft.outputs.draft_tag }}" --yes 2>/dev/null || true
