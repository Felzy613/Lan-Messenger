name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - '.github/workflows/windows-build.yml'

jobs:
  build-and-test:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        working-directory: src/windows-native
        run: msbuild LanMessenger.sln /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Build
        working-directory: src/windows-native
        run: msbuild LanMessenger.sln /p:Configuration=Release /p:Platform=x64

      - name: Test
        working-directory: src/windows-native
        run: dotnet vstest "LanMessenger.Tests\bin\x64\Release\net8.0-windows10.0.19041.0\LanMessenger.Tests.dll" --logger:"console;verbosity=normal"
