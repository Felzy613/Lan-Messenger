name: Windows Build & Release

on:
  push:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - '.github/workflows/windows-build.yml'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-2022
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set version
        id: version
        shell: bash
        run: echo "version=1.0.${{ github.run_number }}" >> $GITHUB_OUTPUT

      - name: Restore
        working-directory: src/windows-native
        run: msbuild LanMessenger.sln /t:Restore /p:Configuration=Release /p:Platform=x64

      - name: Publish
        working-directory: src/windows-native
        run: >
          msbuild LanMessenger/LanMessenger.csproj
          /t:Publish
          /p:Configuration=Release
          /p:Platform=x64
          /p:RuntimeIdentifier=win-x64
          /p:SelfContained=true

      - name: Build installer
        shell: cmd
        run: |
          "C:\Program Files (x86)\Inno Setup 6\iscc.exe" /DMyAppVersion=${{ steps.version.outputs.version }} "src\windows-native\LanMessenger.iss"

      - name: Create GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "LAN Messenger v${{ steps.version.outputs.version }}" \
            --generate-notes \
            "src/windows-native/Output/LanMessenger-Setup-${{ steps.version.outputs.version }}.exe"
