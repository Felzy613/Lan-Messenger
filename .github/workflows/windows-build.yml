name: Windows Build

on:
  push:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - '.github/workflows/windows-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/windows-native/**'
      - '.github/workflows/windows-build.yml'

jobs:
  build-and-test:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        working-directory: src/windows-native
        run: dotnet restore LanMessenger.sln

      - name: Build
        working-directory: src/windows-native
        run: dotnet build LanMessenger.sln --no-restore -c Release

      - name: Test
        working-directory: src/windows-native
        run: dotnet test LanMessenger.Tests --no-build -c Release --logger "console;verbosity=normal"
