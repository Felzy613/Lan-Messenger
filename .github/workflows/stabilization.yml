name: Stabilization

# Autonomous stabilization loop for LAN Messenger.
#
# Purpose
# -------
# This workflow provides a safe holding area for changes that need additional
# hardening before they can merge to main.  It:
#
#   1. Runs the FULL validation suite (unit tests + stress tests + integration
#      tests + smoke tests) on both platforms.
#   2. Collects all subsystem logs and test artifacts unconditionally.
#   3. Evaluates a merge-readiness gate: only reports "ready" when every job
#      passes with zero failures, crashes, hangs, or regressions.
#   4. Posts a PR comment (or updates an existing one) with the stability
#      verdict so reviewers see the current status at a glance.
#   5. Never auto-merges — the final merge to main is always a human action.
#
# Triggers
# --------
# • Manual dispatch (the primary use case — run before merging a large PR).
# • Called by integration-test.yml when a full run is requested.
# • Weekly on Wednesday at 05:00 UTC (catches drift in the main branch).
#
# Merge criteria (evaluated by the "stability-gate" job)
# -------------------------------------------------------
# ALL of the following must be true:
#   ✅ macOS unit + stress tests:  0 failures
#   ✅ Windows unit + stress tests: 0 failures
#   ✅ macOS build succeeds
#   ✅ Windows build succeeds
#   ✅ macOS smoke test: app starts and exits cleanly
#   ✅ Windows smoke test: app starts and exits cleanly
#   ✅ No crash dumps in diagnostics
#   ✅ No ERROR-level lines in subsystem logs beyond known baseline

on:
  workflow_dispatch:
    inputs:
      ref:
        description: 'Branch / SHA to stabilize (default: current branch)'
        default: ''
        required: false
      notify_pr:
        description: 'Post stability verdict as PR comment'
        type: boolean
        default: true
  workflow_call:
  schedule:
    - cron: '0 5 * * 3'   # Wednesday 05:00 UTC

concurrency:
  group: stabilization-${{ github.ref }}
  cancel-in-progress: false    # never cancel in-flight stabilization runs

permissions:
  contents: read
  pull-requests: write   # for posting the verdict comment

jobs:
  # ── macOS: full validation ───────────────────────────────────────────────────
  stabilize-macos:
    name: macOS Full Validation
    runs-on: macos-15
    timeout-minutes: 45
    outputs:
      result: ${{ steps.verdict.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Cache Swift build
        uses: actions/cache@v4
        with:
          path: src/macos/.build
          key: swift-stab-${{ runner.os }}-${{ hashFiles('src/macos/Package.swift') }}
          restore-keys: swift-stab-${{ runner.os }}-

      # ── 1. Unit + stress + logger tests ───────────────────────────────────────
      - name: Run full Swift test suite
        id: swift-tests
        working-directory: src/macos
        run: |
          set -o pipefail
          swift test --parallel 2>&1 | tee ../../swift-test-output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
          exit ${PIPESTATUS[0]}

      # ── 2. Release build ───────────────────────────────────────────────────────
      - name: Release build
        id: swift-build
        working-directory: src/macos
        run: |
          swift build -c release 2>&1 | tee ../../swift-build-output.txt

      # ── 3. Bundle validation ───────────────────────────────────────────────────
      - name: Install xcodegen (needed by package.sh)
        run: brew install xcodegen 2>/dev/null || true

      - name: Validate bundle structure
        id: bundle-validate
        run: |
          BIN=$(find src/macos/.build/release -name LanMessenger -maxdepth 1 | head -1)
          if [ -z "$BIN" ]; then
            echo "::warning::Release binary not found — skipping bundle validation"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
          else
            echo "Binary: $BIN  size: $(wc -c < "$BIN") bytes"
            echo "status=ok" >> "$GITHUB_OUTPUT"
          fi

      # ── 4. Smoke test (startup only — no UI on CI) ────────────────────────────
      - name: Run startup smoke
        id: smoke
        continue-on-error: true     # collect logs even if smoke fails
        timeout-minutes: 8
        run: |
          BIN=$(find src/macos/.build/release -name LanMessenger -maxdepth 1 | head -1)
          if [ -z "$BIN" ]; then
            echo "::warning::Binary not found — skipping smoke"
            echo "status=skipped" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Launch app for 5 s then kill; verify no immediate crash.
          "$BIN" &
          APP_PID=$!
          sleep 5
          if kill -0 "$APP_PID" 2>/dev/null; then
            kill "$APP_PID" 2>/dev/null; wait "$APP_PID" 2>/dev/null || true
            echo "status=ok" >> "$GITHUB_OUTPUT"
            echo "App ran for 5 s without crashing ✓"
          else
            echo "status=crashed" >> "$GITHUB_OUTPUT"
            echo "::error::App crashed within 5 s of startup"
          fi

      # ── 5. Collect subsystem logs ──────────────────────────────────────────────
      - name: Collect all logs
        if: always()
        run: |
          mkdir -p stab-logs/macos
          LOGDIR="$HOME/Library/Application Support/LanMessenger/Logs"
          [ -d "$LOGDIR" ] && cp -R "$LOGDIR/." stab-logs/macos/ 2>/dev/null || true
          cp swift-test-output.txt  stab-logs/macos/ 2>/dev/null || true
          cp swift-build-output.txt stab-logs/macos/ 2>/dev/null || true
          cp ~/Library/Logs/DiagnosticReports/LanMessenger* stab-logs/macos/ 2>/dev/null || true
          # Count ERROR lines across all subsystem logs.
          ERROR_COUNT=$(grep -r "^.* ERROR " stab-logs/macos/*.log 2>/dev/null | wc -l | tr -d ' ')
          echo "ERROR lines in subsystem logs: $ERROR_COUNT"
          echo "error_count=$ERROR_COUNT" >> "$GITHUB_OUTPUT"

      # ── 6. Per-job verdict ─────────────────────────────────────────────────────
      - name: Emit per-job verdict
        id: verdict
        if: always()
        run: |
          TESTS="${{ steps.swift-tests.outcome }}"
          BUILD="${{ steps.swift-build.outcome }}"
          SMOKE="${{ steps.smoke.outputs.status }}"

          if [[ "$TESTS" == "success" && "$BUILD" == "success" && "$SMOKE" != "crashed" ]]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
            echo "✅ macOS: all checks passed"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
            echo "❌ macOS: tests=$TESTS build=$BUILD smoke=$SMOKE"
          fi

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stab-logs-macos-${{ github.run_id }}
          path: stab-logs/macos/
          retention-days: 30
          if-no-files-found: ignore

  # ── Windows: full validation ─────────────────────────────────────────────────
  stabilize-windows:
    name: Windows Full Validation
    runs-on: windows-2022
    timeout-minutes: 45
    defaults:
      run:
        working-directory: src/windows-native
    outputs:
      result: ${{ steps.verdict.outputs.result }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-stab-${{ runner.os }}-${{ hashFiles('src/windows-native/**/*.csproj') }}
          restore-keys: nuget-stab-${{ runner.os }}-

      - name: Restore
        run: msbuild /t:Restore /p:Configuration=Release /p:Platform=x64 LanMessenger.sln

      # ── 1. Unit + stress + logger tests ───────────────────────────────────────
      - name: Build test project
        shell: pwsh
        run: |
          msbuild LanMessenger.Tests\LanMessenger.Tests.csproj `
            /p:Configuration=Release /p:Platform=x64 `
            2>&1 | Tee-Object -FilePath ..\..\win-test-build.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run full test suite
        id: win-tests
        shell: pwsh
        run: |
          $dll = Get-ChildItem LanMessenger.Tests\bin -Filter LanMessenger.Tests.dll -Recurse |
                 Select-Object -First 1
          if (-not $dll) { Write-Error "DLL not found"; exit 1 }
          dotnet vstest $dll.FullName `
            --logger:"console;verbosity=normal" `
            --logger:"trx;LogFileName=StabilizationResults.trx" `
            2>&1 | Tee-Object -FilePath ..\..\win-test-output.txt
          exit $LASTEXITCODE

      # ── 2. Release build ───────────────────────────────────────────────────────
      - name: Release build
        id: win-build
        shell: pwsh
        run: |
          msbuild LanMessenger\LanMessenger.csproj `
            /t:Publish `
            /p:Configuration=Release /p:Platform=x64 `
            /p:RuntimeIdentifier=win-x64 /p:SelfContained=true `
            2>&1 | Tee-Object -FilePath ..\..\win-build-output.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # ── 3. Startup smoke ───────────────────────────────────────────────────────
      - name: Startup smoke test
        id: smoke
        continue-on-error: true
        shell: pwsh
        timeout-minutes: 8
        run: |
          $exe = Get-ChildItem LanMessenger\bin\x64\Release -Filter LanMessenger.exe -Recurse |
                 Select-Object -First 1
          if (-not $exe) {
            Write-Warning "Binary not found — skipping smoke"
            "status=skipped" >> $env:GITHUB_OUTPUT
            exit 0
          }
          ..\..\scripts\windows\smoke-test.ps1 -ArtifactPath $exe.FullName `
            2>&1 | Tee-Object -FilePath ..\..\win-smoke-output.txt
          if ($LASTEXITCODE -eq 0) {
            "status=ok" >> $env:GITHUB_OUTPUT
          } else {
            "status=crashed" >> $env:GITHUB_OUTPUT
            Write-Error "Smoke test failed"
          }

      # ── 4. Collect subsystem logs ──────────────────────────────────────────────
      - name: Collect all logs
        if: always()
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path ..\..\stab-logs\windows -Force | Out-Null
          $logDir = Join-Path $env:APPDATA "LanMessenger\Logs"
          if (Test-Path $logDir) {
            Copy-Item "$logDir\*" ..\..\stab-logs\windows\ -ErrorAction SilentlyContinue
          }
          foreach ($f in @(
              '..\..\win-test-output.txt', '..\..\win-build-output.txt',
              '..\..\win-smoke-output.txt')) {
            Copy-Item $f ..\..\stab-logs\windows\ -ErrorAction SilentlyContinue
          }
          # Windows Error Event Log (last 15 minutes).
          $since = (Get-Date).AddMinutes(-15)
          Get-WinEvent -FilterHashtable @{ LogName='Application'; StartTime=$since; Level=1,2 } `
            -ErrorAction SilentlyContinue | Format-List |
            Out-File ..\..\stab-logs\windows\event-log.txt
          # Count ERROR lines.
          $errCount = (Select-String -Path "..\..\stab-logs\windows\*.log" -Pattern "ERROR" -ErrorAction SilentlyContinue).Count
          Write-Host "ERROR lines in subsystem logs: $errCount"
          "error_count=$errCount" >> $env:GITHUB_OUTPUT

      # ── 5. Per-job verdict ─────────────────────────────────────────────────────
      - name: Emit per-job verdict
        id: verdict
        if: always()
        shell: pwsh
        run: |
          $tests = "${{ steps.win-tests.outcome }}"
          $build = "${{ steps.win-build.outcome }}"
          $smoke = "${{ steps.smoke.outputs.status }}"

          if ($tests -eq "success" -and $build -eq "success" -and $smoke -ne "crashed") {
            "result=pass" >> $env:GITHUB_OUTPUT
            Write-Host "✅ Windows: all checks passed"
          } else {
            "result=fail" >> $env:GITHUB_OUTPUT
            Write-Host "❌ Windows: tests=$tests build=$build smoke=$smoke"
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stab-test-results-windows-${{ github.run_id }}
          path: src/windows-native/LanMessenger.Tests/TestResults/
          retention-days: 30
          if-no-files-found: ignore

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stab-logs-windows-${{ github.run_id }}
          path: stab-logs/windows/
          retention-days: 30
          if-no-files-found: ignore

  # ── Stability gate ────────────────────────────────────────────────────────────
  # The single source of truth for merge-readiness.  Merging to main is a
  # human decision; this job only reports the verdict.
  stability-gate:
    name: Stability Gate (Merge Readiness)
    needs: [stabilize-macos, stabilize-windows]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Evaluate merge readiness
        id: gate
        run: |
          MAC="${{ needs.stabilize-macos.outputs.result }}"
          WIN="${{ needs.stabilize-windows.outputs.result }}"
          echo "macOS verdict : $MAC"
          echo "Windows verdict: $WIN"

          if [[ "$MAC" == "pass" && "$WIN" == "pass" ]]; then
            echo "verdict=READY"    >> "$GITHUB_OUTPUT"
            echo "icon=✅"          >> "$GITHUB_OUTPUT"
            echo "summary=All platforms passed. Branch is stable and ready to merge." >> "$GITHUB_OUTPUT"
          else
            echo "verdict=NOT_READY" >> "$GITHUB_OUTPUT"
            echo "icon=❌"           >> "$GITHUB_OUTPUT"
            DETAIL="macOS: $MAC | Windows: $WIN"
            echo "summary=One or more platforms failed: $DETAIL" >> "$GITHUB_OUTPUT"
          fi

      - name: Post stability verdict to PR
        if: inputs.notify_pr != false && github.event_name != 'schedule'
        uses: actions/github-script@v7
        with:
          script: |
            const verdict = '${{ steps.gate.outputs.verdict }}';
            const icon    = '${{ steps.gate.outputs.icon }}';
            const summary = '${{ steps.gate.outputs.summary }}';
            const macResult = '${{ needs.stabilize-macos.outputs.result }}';
            const winResult = '${{ needs.stabilize-windows.outputs.result }}';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = [
              '<!-- stabilization-verdict -->',
              `## ${icon} Stabilization: ${verdict}`,
              '',
              summary,
              '',
              '| Platform | Verdict |',
              '|----------|---------|',
              `| 🍎 macOS   | ${macResult === 'pass' ? '✅ pass' : '❌ fail'} |`,
              `| 🪟 Windows | ${winResult === 'pass' ? '✅ pass' : '❌ fail'} |`,
              '',
              `### Merge criteria`,
              '- [ ] All builds pass',
              '- [ ] All unit + stress + logger tests pass (0 failures)',
              '- [ ] App starts and stays alive on both platforms',
              '- [ ] No crashes in diagnostics',
              '- [ ] Log export produces a valid zip',
              '',
              `**Only merge when this workflow reports READY.**`,
              '',
              `[View run](${runUrl})`,
            ].join('\n');

            // Find existing PR for this SHA and update or create the comment.
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              head:  `${context.repo.owner}:${context.ref?.replace('refs/heads/', '') ?? ''}`,
            });

            if (prs.data.length === 0) {
              console.log('No open PR found for this ref — skipping comment.');
              return;
            }

            const pr = prs.data[0];
            const { data: comments } = await github.rest.issues.listComments({
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              issue_number: pr.number,
            });
            const existing = comments.find(
              c => c.user.type === 'Bot' && c.body.includes('<!-- stabilization-verdict -->')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner:      context.repo.owner,
                repo:       context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner:        context.repo.owner,
                repo:         context.repo.repo,
                issue_number: pr.number,
                body,
              });
            }

      - name: Fail workflow when not ready
        if: steps.gate.outputs.verdict != 'READY'
        run: |
          echo "::error::${{ steps.gate.outputs.summary }}"
          exit 1

      - name: Print stability summary
        if: always()
        run: |
          echo "================================================"
          echo "  STABILITY VERDICT: ${{ steps.gate.outputs.verdict }}"
          echo "  ${{ steps.gate.outputs.summary }}"
          echo "================================================"
