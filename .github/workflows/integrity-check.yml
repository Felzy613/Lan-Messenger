name: Integrity Check

# Weekly audit: verifies that both per-platform releases exist and have assets,
# and that version files contain valid semver. Also runs on manual dispatch.
#
# Failures are surfaced via the workflow step summary and as a workflow failure
# in the Actions tab — no GitHub Issues are created automatically.

on:
  schedule:
    - cron: '0 8 * * 1'   # Every Monday at 08:00 UTC
  workflow_dispatch: {}

concurrency:
  group: integrity-check
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  integrity:
    name: Artifact Integrity Audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Audit platform releases and version files
        id: audit
        run: |
          FAILURES=""
          SUMMARY=""

          # ── Version files ─────────────────────────────────────────────────
          for PLATFORM in macos windows; do
            FILE="version/${PLATFORM}.json"
            if [ ! -f "$FILE" ]; then
              FAILURES="$FAILURES\n- Missing version file: \`$FILE\`"
            else
              VERSION=$(jq -r '.version' "$FILE" 2>/dev/null || echo "invalid")
              if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]]; then
                FAILURES="$FAILURES\n- Invalid semver in \`$FILE\`: \`$VERSION\`"
              else
                SUMMARY="$SUMMARY\n✓ $FILE: $VERSION"
                echo "✓ $FILE: $VERSION"
              fi
            fi
          done

          # ── Platform releases ─────────────────────────────────────────────
          RELEASES=$(gh release list --limit 100 --json tagName,createdAt \
            --jq 'sort_by(.createdAt) | reverse')

          MAC_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("macos-v"))] | first | .tagName // empty')
          WIN_TAG=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("windows-v"))] | first | .tagName // empty')

          echo "Latest macOS:   ${MAC_TAG:-(none)}"
          echo "Latest Windows: ${WIN_TAG:-(none)}"

          for TAG_VAR in MAC_TAG WIN_TAG; do
            TAG="${!TAG_VAR}"
            LABEL=$([ "$TAG_VAR" = "MAC_TAG" ] && echo "macOS" || echo "Windows")
            PREFIX=$([ "$TAG_VAR" = "MAC_TAG" ] && echo "macos-v" || echo "windows-v")
            if [ -z "$TAG" ]; then
              FAILURES="$FAILURES\n- No \`${PREFIX}*\` platform release found"
            else
              ASSET_COUNT=$(gh release view "$TAG" --json assets -q '.assets | length')
              if [ "$ASSET_COUNT" -eq 0 ]; then
                FAILURES="$FAILURES\n- $LABEL release \`$TAG\` has no assets"
              else
                SUMMARY="$SUMMARY\n✓ $TAG: $ASSET_COUNT asset(s)"
                echo "✓ $TAG: $ASSET_COUNT asset(s)"
              fi
            fi
          done

          # ── Combined release ──────────────────────────────────────────────
          COMBINED=$(echo "$RELEASES" | \
            jq -r '[.[] | select(.tagName | startswith("release-"))] | first | .tagName // empty')
          if [ -z "$COMBINED" ]; then
            FAILURES="$FAILURES\n- No combined \`release-*\` release found"
          else
            SUMMARY="$SUMMARY\n✓ Latest combined: $COMBINED"
            echo "✓ Latest combined: $COMBINED"
          fi

          # ── Result ────────────────────────────────────────────────────────
          if [ -n "$FAILURES" ]; then
            echo "has_failures=true" >> $GITHUB_OUTPUT
            {
              echo "failures<<EOF"
              printf "$FAILURES"
              echo ""
              echo "EOF"
            } >> $GITHUB_OUTPUT
            echo "::error::Integrity check failed — see step summary"
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
            echo "All integrity checks passed"
          fi

      - name: Write step summary
        if: always()
        run: |
          if [ "${{ steps.audit.outputs.has_failures }}" = "true" ]; then
            {
              echo "## ❌ Integrity Check Failed"
              echo ""
              printf "${{ steps.audit.outputs.failures }}"
              echo ""
              echo ""
              echo "Review the [releases page](../../releases) and re-run a build if any platform is missing."
            } >> $GITHUB_STEP_SUMMARY
          else
            {
              echo "## ✅ Integrity Check Passed"
              echo ""
              echo "All platform releases and version files are healthy."
            } >> $GITHUB_STEP_SUMMARY
          fi

      - name: Fail workflow on integrity issues
        if: steps.audit.outputs.has_failures == 'true'
        run: exit 1
