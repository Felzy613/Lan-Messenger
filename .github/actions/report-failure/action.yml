name: Report CI Failure
description: >
  Fingerprint a CI failure, then create a new GitHub Issue or append a comment
  to an existing matching issue to avoid notification spam. On repeated failures
  the same issue accumulates comments rather than spawning duplicates.

inputs:
  platform:
    description: 'macos or windows'
    required: true
  version:
    description: 'App version string (e.g. "1.0.8")'
    required: true
  failure_type:
    description: 'SMOKE_FAILURE | BUILD_FAILURE | TEST_FAILURE | SIGNING_FAILURE'
    required: true
  log_path:
    description: 'Workspace-relative path to log file used for fingerprinting'
    required: false
    default: ''
  github_token:
    description: 'GitHub token with issues:write permission'
    required: true

runs:
  using: composite
  steps:
    - name: Fingerprint failure and manage GitHub Issue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github_token }}
        PLATFORM: ${{ inputs.platform }}
        VERSION: ${{ inputs.version }}
        FAILURE_TYPE: ${{ inputs.failure_type }}
        LOG_PATH: ${{ inputs.log_path }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        COMMIT: ${{ github.sha }}
      run: |
        # ── Extract log excerpt for fingerprinting ─────────────────────────
        if [ -n "$LOG_PATH" ] && [ -f "$LOG_PATH" ]; then
          EXCERPT=$(grep -i -E "(error|fatal|crash|exception|failed)" "$LOG_PATH" 2>/dev/null \
            | head -5 \
            | tr -s ' \t' ' ' \
            | tr '[:upper:]' '[:lower:]' \
            | head -c 256 \
            || echo "no-excerpt")
          LOG_BODY=$(tail -60 "$LOG_PATH" | head -c 4000)
        else
          EXCERPT="no-log-file"
          LOG_BODY="(no log file available)"
        fi

        # ── Generate fingerprint ───────────────────────────────────────────
        FINGERPRINT=$(printf '%s' "${PLATFORM}:${FAILURE_TYPE}:${EXCERPT}" \
          | shasum -a 256 | cut -d' ' -f1)
        echo "Failure fingerprint: $FINGERPRINT"

        # ── Ensure required labels exist ───────────────────────────────────
        gh label create "ci-failure"              --color "d73a4a" --description "CI pipeline failure"     2>/dev/null || true
        gh label create "platform:macos"          --color "0075ca" --description "macOS platform"          2>/dev/null || true
        gh label create "platform:windows"        --color "0075ca" --description "Windows platform"        2>/dev/null || true
        gh label create "type:smoke-failure"      --color "e4e669" --description "Startup smoke test failure" 2>/dev/null || true
        gh label create "type:build-failure"      --color "e4e669" --description "Build failure"           2>/dev/null || true
        gh label create "type:test-failure"       --color "e4e669" --description "Unit test failure"       2>/dev/null || true
        gh label create "type:signing-failure"    --color "e4e669" --description "Code signing failure"    2>/dev/null || true
        gh label create "type:integrity"          --color "e4e669" --description "Integrity check failure" 2>/dev/null || true

        TYPE_LABEL="type:$(echo "${FAILURE_TYPE}" | tr '[:upper:]' '[:lower:]' | tr '_' '-')"

        # ── Search for existing open issue with matching fingerprint ───────
        EXISTING=$(gh issue list \
          --label "ci-failure" \
          --state open \
          --limit 100 \
          --json number,body \
          --jq ".[] | select(.body | strings | contains(\"<!-- fingerprint: ${FINGERPRINT} -->\")) | .number" \
          2>/dev/null | head -1 || true)

        TITLE="[${PLATFORM} ${VERSION}] ${FAILURE_TYPE} — CI failure"

        if [ -n "$EXISTING" ]; then
          echo "Appending to existing issue #$EXISTING"
          printf '%s\n' \
            "Recurrence: $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "" \
            "Commit: ${COMMIT}" \
            "Run:    ${RUN_URL}" \
            "" \
            "Log tail:" \
            "$(echo "$LOG_BODY" | tail -20)" \
            > /tmp/recurrence-body.md
          gh issue comment "$EXISTING" --body "$(cat /tmp/recurrence-body.md)"

        else
          echo "Creating new issue: $TITLE"
          printf '%s\n' \
            "CI Failure: ${FAILURE_TYPE}" \
            "" \
            "Platform:     ${PLATFORM}" \
            "Version:      ${VERSION}" \
            "Failure type: ${FAILURE_TYPE}" \
            "Commit:       ${COMMIT}" \
            "Run:          ${RUN_URL}" \
            "Date:         $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            "" \
            "Log Excerpt:" \
            "${LOG_BODY}" \
            "" \
            "<!-- fingerprint: ${FINGERPRINT} -->" \
            > /tmp/issue-body.md
          gh issue create \
            --title "$TITLE" \
            --label "ci-failure" \
            --label "platform:${PLATFORM}" \
            --label "${TYPE_LABEL}" \
            --body "$(cat /tmp/issue-body.md)"
        fi
